<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin PRO Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .form {
      max-width: 500px;
      margin: auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .match {
      background: #1a1a1a;
      padding: 10px;
      margin: 10px auto;
      max-width: 600px;
      border-radius: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background: red;
      padding: 5px 10px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
      margin-left: 5px;
    }

    .btn.edit {
      background: orange;
    }
  </style>
</head>

<body>

<h2>⚽ FutCat Admin PRO Panel</h2>

<div class="form">

  <input id="jornada" placeholder="Jornada">

  <select id="liga">
    <option value="">Liga</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <input id="local" placeholder="Local">
  <input id="visitante" placeholder="Visitante">
  <input id="gl" placeholder="Goles local">
  <input id="gv" placeholder="Goles visitante">

  <button onclick="save()">Guardar partido</button>

</div>

<h2>📋 Partidos</h2>
<div id="list"></div>

<script>

let partidos = [];

async function load() {
  const res = await fetch("/partidos");
  const json = await res.json();

  partidos = json.data;

  let html = "";

  partidos.forEach(p => {
    html += `
      <div class="match">
        <div class="row">
          <div>
            <b>${p.local}</b> ${p.goles_local} - ${p.goles_visitante} <b>${p.visitante}</b><br>
            Jornada ${p.jornada} | Liga ${p.liga}
          </div>
          <div>
            <button class="btn edit" onclick="editMatch(${p.id})">Editar</button>
            <button class="btn" onclick="deleteMatch(${p.id})">X</button>
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function save() {

  const data = {
    jornada: document.getElementById("jornada").value,
    liga: document.getElementById("liga").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: document.getElementById("gl").value,
    goles_visitante: document.getElementById("gv").value
  };

  await fetch("/add-partido", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  load();
}

async function deleteMatch(id) {
  await fetch("/delete-partido", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ row: id })
  });

  load();
}

async function editMatch(id) {

  const p = partidos.find(x => x.id === id);

  const gl = prompt("Goles local", p.goles_local);
  const gv = prompt("Goles visitante", p.goles_visitante);

  await fetch("/edit-partido", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      row: id,
      jornada: p.jornada,
      liga: p.liga,
      local: p.local,
      visitante: p.visitante,
      goles_local: gl,
      goles_visitante: gv
    })
  });

  load();
}

load();

</script>

</body>
</html>
