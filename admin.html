<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body {
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  width:300px;
  background:#111;
  padding:20px;
  border-radius:10px;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
  box-sizing:border-box;
}
button {
  width:100%;
  padding:10px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:disabled {
  background:#0a5c38;
  color:#aaa;
  cursor:not-allowed;
}
.error {
  color:#ff5555;
  font-size:12px;
  min-height:16px;
  margin-top:6px;
}
</style>
</head>
<body>
<div class="box">
  <h3>🔐 LOGIN ADMIN</h3>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button id="btnLogin" onclick="login()">Entrar</button>
  <div class="error" id="error"></div>
</div>
<script>
const API = "https://fcf-headless.onrender.com";

async function login() {

  const usuario = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value;
  const errorEl = document.getElementById("error");
  const btn = document.getElementById("btnLogin");

  errorEl.innerText = "";

  if(!usuario || !password){
    errorEl.innerText = "Rellena usuario y contraseña";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Entrando...";

  try {

    const res = await fetch(API + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, password })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      errorEl.innerText = data.error || "Login incorrecto";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("rol", data.rol);
    localStorage.setItem("usuario", data.usuario);

    window.location.href = "admin-panel.html";

  } catch(err){
    errorEl.innerText = "Error de conexión";
  } finally {
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
}

document.getElementById("pass").addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});
</script>
</body>
</html>
