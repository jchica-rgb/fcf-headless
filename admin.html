<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .box {
      width: 420px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #00aa00;
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #00cc00;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>⚽ FutCat Admin PRO</h2>

  <input id="jornada" placeholder="Jornada">

  <select id="liga">
    <option value="">Selecciona liga</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <select id="local">
    <option value="">Local</option>
    <option>Barcelona</option>
    <option>Espanyol</option>
    <option>Girona</option>
    <option>Madrid</option>
    <option>Atletico</option>
  </select>

  <select id="visitante">
    <option value="">Visitante</option>
    <option>Barcelona</option>
    <option>Espanyol</option>
    <option>Girona</option>
    <option>Madrid</option>
    <option>Atletico</option>
  </select>

  <input id="gl" placeholder="Goles local">
  <input id="gv" placeholder="Goles visitante">

  <button onclick="saveMatch()">Guardar partido</button>

  <div class="msg" id="msg"></div>

</div>

<script>

// ============================
// MEMORIA DE LIGA (UX PRO)
// ============================
function saveLastLiga(liga) {
  localStorage.setItem("lastLiga", liga);
}

function getLastLiga() {
  return localStorage.getItem("lastLiga");
}

// ============================
// AUTO CARGA LIGA
// ============================
window.onload = () => {
  const liga = getLastLiga();
  if (liga) {
    document.getElementById("liga").value = liga;
  }
};

// ============================
// GUARDAR PARTIDO
// ============================
async function saveMatch() {

  const liga = document.getElementById("liga").value;
  saveLastLiga(liga);

  const data = {
    jornada: document.getElementById("jornada").value,
    liga: liga,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: document.getElementById("gl").value,
    goles_visitante: document.getElementById("gv").value
  };

  const res = await fetch("/add-partido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  if (json.ok) {
    document.getElementById("msg").innerHTML = "✅ Partido guardado";
    clearForm();
  } else {
    document.getElementById("msg").innerHTML = "❌ " + json.error;
  }
}

// ============================
// LIMPIAR FORM
// ============================
function clearForm() {
  document.getElementById("jornada").value = "";
  document.getElementById("local").value = "";
  document.getElementById("visitante").value = "";
  document.getElementById("gl").value = "";
  document.getElementById("gv").value = "";
}

</script>

</body>
</html>
