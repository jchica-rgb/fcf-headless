<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    .box {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00aa00;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>⚽ FutCat Admin Panel</h1>

<div class="box">

  <input id="liga" placeholder="Liga (1,2,3...)">
  <input id="local" placeholder="Equipo local">
  <input id="visitante" placeholder="Equipo visitante">
  <input id="gl" placeholder="Goles local">
  <input id="gv" placeholder="Goles visitante">

  <button onclick="saveMatch()">Guardar partido</button>

  <div class="msg" id="msg"></div>

</div>

<script>
async function saveMatch() {

  const data = {
    liga: document.getElementById("liga").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: document.getElementById("gl").value,
    goles_visitante: document.getElementById("gv").value
  };

  const res = await fetch("/add-partido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  if (json.ok) {
    document.getElementById("msg").innerHTML = "✅ Partido guardado correctamente";
  } else {
    document.getElementById("msg").innerHTML = "❌ Error: " + json.error;
  }

}
</script>

</body>
</html>
