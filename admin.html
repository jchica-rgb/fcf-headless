<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;

      /* 🔥 CENTRADO TOTAL */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #222;
      padding: 25px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      border-radius: 6px;
    }

    button:hover {
      background: #00aa00;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>⚽ FutCat Admin PRO</h1>

  <input id="jornada" placeholder="Jornada (1,2,3...)">
  <input id="liga" placeholder="Liga (1,2,3...)">
  <input id="local" placeholder="Equipo local">
  <input id="visitante" placeholder="Equipo visitante">
  <input id="gl" placeholder="Goles local">
  <input id="gv" placeholder="Goles visitante">

  <button onclick="saveMatch()">Guardar partido</button>

  <div class="msg" id="msg"></div>

</div>

<script>
async function saveMatch() {
  try {

    const data = {
      jornada: document.getElementById("jornada").value,
      liga: document.getElementById("liga").value,
      local: document.getElementById("local").value,
      visitante: document.getElementById("visitante").value,
      goles_local: document.getElementById("gl").value,
      goles_visitante: document.getElementById("gv").value
    };

    const res = await fetch("/add-partido", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      document.getElementById("msg").innerHTML =
        "❌ Error servidor: " + text;
      return;
    }

    if (!res.ok || !json.ok) {
      document.getElementById("msg").innerHTML =
        "❌ Error: " + (json.error || "desconocido");
      return;
    }

    document.getElementById("msg").innerHTML =
      "✅ Partido guardado correctamente";

  } catch (err) {
    document.getElementById("msg").innerHTML =
      "❌ Error: " + err.message;
  }
}
</script>

</body>
</html>
