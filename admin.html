<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      border-radius: 6px;
    }

    button:hover {
      background: #00aa00;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>⚽ FutCat Admin PRO</h2>

  <input id="jornada" placeholder="Jornada">

  <!-- LIGA -->
  <select id="liga">
    <option value="">Selecciona liga</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <!-- EQUIPOS -->
  <select id="local">
    <option value="">Local</option>
    <option>Barcelona</option>
    <option>Espanyol</option>
    <option>Girona</option>
    <option>Real Madrid</option>
    <option>Atletico</option>
  </select>

  <select id="visitante">
    <option value="">Visitante</option>
    <option>Barcelona</option>
    <option>Espanyol</option>
    <option>Girona</option>
    <option>Real Madrid</option>
    <option>Atletico</option>
  </select>

  <input id="gl" placeholder="Goles local">
  <input id="gv" placeholder="Goles visitante">

  <button onclick="saveMatch()">Guardar partido</button>

  <div class="msg" id="msg"></div>

</div>

<script>

async function saveMatch() {

  const data = {
    jornada: document.getElementById("jornada").value,
    liga: document.getElementById("liga").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: document.getElementById("gl").value,
    goles_visitante: document.getElementById("gv").value
  };

  const res = await fetch("/add-partido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  if (!json.ok) {
    document.getElementById("msg").innerHTML = "❌ " + json.error;
  } else {
    document.getElementById("msg").innerHTML = "✅ Partido guardado";
  }
}

</script>

</body>
</html>
