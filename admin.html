<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin FUTCAT Login</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111;
  padding:30px;
  border-radius:10px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
}

button {
  width:100%;
  padding:10px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#msg {
  margin-top:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="box">
  <h2>⚽ LOGIN ADMIN</h2>

  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <div id="msg"></div>
</div>

<script>

const API = "https://fcf-headless.onrender.com";

async function login() {

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user, pass })
  });

  const data = await res.json();

  if (!data.ok) {
    document.getElementById("msg").innerText = "❌ Login incorrecto";
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("role", data.role);

  document.getElementById("msg").innerText = "✔ Login correcto";

  setTimeout(() => {
    alert("Login OK. Siguiente paso: panel admin");
  }, 800);
}

</script>

</body>
</html>
