<!DOCTYPE html>
<html>
<head>
  <title>FutCat Admin</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      display:flex;
      justify-content:center;
      padding-top:40px;
    }

    .box {
      width:420px;
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:6px 0;
      border:none;
      background:#222;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      background:#00aa00;
      border:none;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">

<h2>⚽ Admin FutCat</h2>

<input id="jornada" placeholder="Jornada">

<select id="liga">
  <option value="">Liga</option>
  <option value="1">Lliga Elit</option>
  <option value="2">Primera Catalana</option>
  <option value="3">Segunda Catalana</option>
</select>

<input id="local" placeholder="Local">
<input id="visitante" placeholder="Visitante">
<input id="gl" placeholder="Goles local">
<input id="gv" placeholder="Goles visitante">

<button onclick="save()">Guardar</button>

<p id="msg"></p>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

async function save(){

  const data = {
    jornada: document.getElementById("jornada").value,
    liga: document.getElementById("liga").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: document.getElementById("gl").value,
    goles_visitante: document.getElementById("gv").value
  };

  const res = await fetch(`${API}/add-partido`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  document.getElementById("msg").innerText =
    json.ok ? "OK guardado" : "Error";
}

</script>

</body>
</html>
