<!DOCTYPE html>
<html>
<head>
  <title>TERRITORI FUTCAT LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 16px;
      text-align: center;
      background: #111;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      color: #00ff88;
    }

    tr:hover td {
      background: #1a1a1a;
    }

    /* 🟢 VERDE ASCENSO */
    tr.green td {
      color: #00ff88 !important;
      font-weight: bold;
    }

    /* 🟡 MEDIA */
    tr.yellow td {
      color: #ffd166 !important;
    }

    /* 🔴 DESCENSO */
    tr.red td {
      color: #ff4d4d !important;
    }

    .match {
      background: #151515;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 8px;
      border: 1px solid #1f1f1f;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <select id="liga" onchange="loadData()"></select>

  <h3>📊 Clasificación</h3>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

// ======================
// LIGAS DINÁMICAS
// ======================
async function loadLigas() {

  const res = await fetch(`${API}/ligas`);
  const json = await res.json();

  const select = document.getElementById("liga");

  select.innerHTML = `<option value="">Todas las ligas</option>`;

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = "Liga " + l;
    select.appendChild(opt);
  });
}

// ======================
// LOAD DATA
// ======================
async function loadData() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(`${API}/clasificacion?liga=${liga}`);
  const json = await res.json();

  const tabla = document.getElementById("tabla");

  const data = json.data || [];

  const total = data.length;

  tabla.innerHTML = data.map((t, i) => {

    let rowClass = "";

    if (i < total * 0.25) rowClass = "green";
    else if (i > total * 0.75) rowClass = "red";
    else rowClass = "yellow";

    return `
      <tr class="${rowClass}">
        <td>${i + 1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  }).join("");

  const res2 = await fetch(`${API}/partidos?liga=${liga}`);
  const json2 = await res2.json();

  const partidos = document.getElementById("partidos");

  partidos.innerHTML = (json2.data || []).map(p => `
    <div class="match">
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    </div>
  `).join("");

}

// ======================
// INIT
// ======================
loadLigas();
loadData();

</script>

</body>
</html>
