<!DOCTYPE html>
<html lang="es">
<head>
  console.log("🔥 NUEVO DASHBOARD CARGADO - VERSION ACTUALIZADA");
  <meta charset="UTF-8">
  <title>TERRITORI FUTCAT LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #111;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      color: #00ff88;
    }

    tr:hover td {
      background: #1a1a1a;
    }

    tr.green td { color: #00ff88 !important; font-weight: bold; }
    tr.yellow td { color: #ffd166 !important; }
    tr.red td { color: #ff4d4d !important; }

    .match {
      background: #151515;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 6px;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
    }

    #live {
      text-align: center;
      color: #00ff88;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div id="live">🔴 Inicializando...</div>

  <select id="liga"></select>

  <h3>📊 Clasificación</h3>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

// ======================
// STATE GLOBAL
// ======================
let currentLiga = null;
let lastStateByLiga = {};
let lastUpdate = null;

// ======================
// INIT SEGURO
// ======================
async function init() {
  await loadLigas();
}

// ======================
// LIGAS (ROBUSTO)
// ======================
async function loadLigas() {

  try {

    const res = await fetch(`${API}/ligas`);
    const json = await res.json();

    const data = json.data || [];

    const select = document.getElementById("liga");
    select.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      select.innerHTML = "<option>No hay ligas</option>";
      return;
    }

    data.forEach(l => {

      const opt = document.createElement("option");

      opt.value = l.id ?? "";
      opt.textContent = l.name ?? "Liga sin nombre";

      select.appendChild(opt);
    });

    // 🔥 IMPORTANTE: set inicial seguro
    currentLiga = data[0].id;
    select.value = currentLiga;

    // evento controlado
    select.addEventListener("change", (e) => {
      currentLiga = e.target.value;
      loadData();
    });

    // 🔥 FORZAR PRIMERA CARGA
    loadData();

  } catch (err) {
    console.error("ERROR LIGAS:", err);
  }
}

// ======================
// DATA PRINCIPAL
// ======================
async function loadData() {

  if (!currentLiga) return;

  try {

    const res = await fetch(`${API}/clasificacion?liga=${currentLiga}`);
    const json = await res.json();

    const data = json.data || [];

    // 🔥 DETECCIÓN DE CAMBIO POR LIGA
    const hash = JSON.stringify(data);

    if (lastStateByLiga[currentLiga] !== hash) {
      lastStateByLiga[currentLiga] = hash;
      lastUpdate = new Date();
    }

    renderTable(data);
    updateLive();

    const res2 = await fetch(`${API}/partidos?liga=${currentLiga}`);
    const json2 = await res2.json();

    renderMatches(json2.data || []);

  } catch (err) {
    console.error("ERROR LOAD DATA:", err);
  }
}

// ======================
// RENDER CLASIFICACION
// ======================
function renderTable(data) {

  const total = data.length;

  document.getElementById("tabla").innerHTML = data.map((t,i)=>{

    let cls = "";

    if (i < total * 0.25) cls = "green";
    else if (i > total * 0.75) cls = "red";
    else cls = "yellow";

    return `
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  }).join("");
}

// ======================
// RENDER PARTIDOS
// ======================
function renderMatches(matches) {

  document.getElementById("partidos").innerHTML =
    matches.map(p=>`
      <div class="match">
        <div>${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div>${p.visitante}</div>
      </div>
    `).join("");
}

// ======================
// LIVE
// ======================
function updateLive() {

  document.getElementById("live").innerText =
    lastUpdate
      ? "🔴 Última actualización: " + lastUpdate.toLocaleTimeString()
      : "🔴 Sin cambios";
}

// ======================
// AUTO REFRESH
// ======================
setInterval(() => {
  if (currentLiga) loadData();
}, 15000);

// ======================
// START
// ======================
init();

</script>

</body>
</html>
