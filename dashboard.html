<!DOCTYPE html>
<html>
<head>
  <title>FutCat LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #111;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #1a1a1a;
      color: white;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      color: #00ff88;
    }

    tr:nth-child(1) td {
      color: #00ff88;
      font-weight: bold;
    }

    tr:nth-child(n+7) td {
      color: #ff4d4d;
    }

    .match {
      background: #151515;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>⚽ FUTCAT LIVE</header>

<div class="container">

  <select id="liga" onchange="loadData()">
    <option value="">Todas las ligas</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <h3>📊 Clasificación</h3>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

// =========================
// LOAD DATA
// =========================
async function loadData() {

  const liga = document.getElementById("liga").value;

  try {

    // =====================
    // CLASIFICACIÓN
    // =====================
    const res = await fetch(`${API}/clasificacion?liga=${liga}`);
    const json = await res.json();

    const tabla = document.getElementById("tabla");

    if (!json.data) {
      tabla.innerHTML = "<tr><td colspan='7'>Sin datos</td></tr>";
      return;
    }

    tabla.innerHTML = json.data.map((t,i)=>`
      <tr>
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `).join("");

    // =====================
    // PARTIDOS
    // =====================
    const res2 = await fetch(`${API}/partidos?liga=${liga}`);
    const json2 = await res2.json();

    const partidos = document.getElementById("partidos");

    if (!json2.data) {
      partidos.innerHTML = "Sin partidos";
      return;
    }

    partidos.innerHTML = json2.data.map(p=>`
      <div class="match">
        <div>${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div>${p.visitante}</div>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
  }
}

loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
