<!DOCTYPE html>
<html lang="es">
<head>
  <title>TERRITORI FUTCAT LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #111;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1a1a1a;
      color: white;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      color: #00ff88;
    }

    tr:hover td {
      background: #1a1a1a;
    }

    tr.green td { color: #00ff88 !important; font-weight: bold; }
    tr.yellow td { color: #ffd166 !important; }
    tr.red td { color: #ff4d4d !important; }

    .match {
      background: #151515;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
    }

    #live {
      text-align: center;
      color: #00ff88;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div id="live">🔴 Iniciando...</div>

  <select id="liga" onchange="loadData()"></select>

  <h3>📊 Clasificación</h3>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

// ======================
// STATE (LIVE REAL)
// ======================
let lastHash = "";
let lastUpdate = null;

// ======================
// HASH FUNC
// ======================
function createHash(obj) {
  return JSON.stringify(obj);
}

// ======================
// LIVE DISPLAY
// ======================
function updateLive() {

  if (!lastUpdate) {
    document.getElementById("live").innerText =
      "🔴 Sin cambios todavía";
    return;
  }

  document.getElementById("live").innerText =
    "🔴 Última actualización real: " +
    lastUpdate.toLocaleDateString() + " " +
    lastUpdate.toLocaleTimeString();
}

// ======================
// LIGAS
// ======================
async function loadLigas() {

  const res = await fetch(`${API}/ligas`);
  const json = await res.json();

  const select = document.getElementById("liga");

  select.innerHTML = "";

  (json.data || []).forEach(l => {

    const opt = document.createElement("option");

    opt.value = l.id;
    opt.textContent = l.name;

    select.appendChild(opt);
  });
}

// ======================
// LOAD DATA (LIVE LOGIC)
// ======================
async function loadData() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(`${API}/clasificacion?liga=${liga}`);
  const json = await res.json();

  const data = json.data || [];
  const hash = createHash(data);

  // 🔥 DETECTAR CAMBIO REAL
  if (hash !== lastHash) {
    lastHash = hash;
    lastUpdate = new Date();
  }

  const total = data.length;

  document.getElementById("tabla").innerHTML = data.map((t,i)=>{

    let cls = "";

    if (i < total * 0.25) cls = "green";
    else if (i > total * 0.75) cls = "red";
    else cls = "yellow";

    return `
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  }).join("");

  const res2 = await fetch(`${API}/partidos?liga=${liga}`);
  const json2 = await res2.json();

  document.getElementById("partidos").innerHTML =
    (json2.data || []).map(p=>`
      <div class="match">
        <div>${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div>${p.visitante}</div>
      </div>
    `).join("");

  updateLive();
}

// ======================
// INIT
// ======================
loadLigas();
loadData();

setInterval(loadData, 15000);

</script>

</body>
</html>
