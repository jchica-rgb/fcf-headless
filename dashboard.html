<!DOCTYPE html>
<html>
<head>
  <title>FutCat LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #111;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #1a1a1a;
      color: white;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: #111;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      color: #00ff88;
    }

    .match {
      background: #151515;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>⚽ FutCat LIVE</header>

<div class="container">

  <select id="liga" onchange="loadData()">
    <option value="">Todas las ligas</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <h2>📊 Clasificación</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h2>⚽ Partidos</h2>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fct-headless.onrender.com";

async function loadData() {

  const liga = document.getElementById("liga").value;

  // =====================
  // CLASIFICACIÓN
  // =====================
  const res = await fetch(`${API}/clasificacion?liga=${liga}`);
  const json = await res.json();

  let html = "";

  json.data.forEach((t, i) => {
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  });

  document.getElementById("tabla").innerHTML = html;

  // =====================
  // PARTIDOS
  // =====================
  const res2 = await fetch(`${API}/partidos?liga=${liga}`);
  const json2 = await res2.json();

  let html2 = "";

  json2.data.forEach(p => {
    html2 += `
      <div class="match">
        <div>${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div>${p.visitante}</div>
      </div>
    `;
  });

  document.getElementById("partidos").innerHTML = html2;
}

loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
