<!DOCTYPE html>
<html>
<head>
  <title>FutCat Pro Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: white;
    }

    /* CLASIFICACIÓN */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 40px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      background: #1c1c1c;
      color: #00ff88;
    }

    /* PARTIDOS */
    .match {
      background: #151515;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team {
      width: 40%;
      font-weight: bold;
    }

    .score {
      width: 20%;
      text-align: center;
      color: #00ff88;
      font-size: 18px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<header>⚽ FutCat PRO Dashboard</header>

<div class="container">

  <select id="liga" onchange="loadData()">
    <option value="">Todas las ligas</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <h2>📊 Clasificación</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h2>⚽ Partidos</h2>
  <div id="partidos"></div>

</div>

<script>

async function loadData() {

  const liga = document.getElementById("liga").value;

  // CLASIFICACIÓN
  const res = await fetch("/clasificacion?liga=" + liga);
  const json = await res.json();

  let html = "";

  json.data.forEach((t, i) => {
    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  });

  document.getElementById("tabla").innerHTML = html;

  // PARTIDOS
  const res2 = await fetch("/partidos");
  const json2 = await res2.json();

  let html2 = "";

  json2.data.forEach(p => {
    html2 += `
      <div class="match">
        <div class="team">${p.local}</div>

        <div class="score">
          ${p.goles_local} - ${p.goles_visitante}
        </div>

        <div class="team" style="text-align:right">
          ${p.visitante}
        </div>
      </div>

      <div class="meta">
        Liga ${p.liga} | Jornada ${p.jornada}
      </div>
    `;
  });

  document.getElementById("partidos").innerHTML = html2;
}

loadData();

</script>

</body>
</html>
