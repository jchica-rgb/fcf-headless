<!DOCTYPE html>
<html>
<head>
  <title>FutCat LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111 0%, #000 100%);
      color: white;
    }

    header {
      padding: 18px;
      text-align: center;
      background: #0d0d0d;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid #1f1f1f;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      background: #151515;
      color: white;
      border: 1px solid #222;
      border-radius: 8px;
      outline: none;
    }

    /* =========================
       TABLE DESIGN PRO
    ========================== */

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f0f0f;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    th {
      background: #111;
      color: #00ff88;
      padding: 14px;
      font-size: 14px;
    }

    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #1c1c1c;
      transition: 0.2s;
    }

    tr:hover td {
      background: #161616;
    }

    /* TOP 3 EFFECT */
    tr:nth-child(1) td {
      color: #ffd700;
      font-weight: bold;
    }

    tr:nth-child(2) td {
      color: #c0c0c0;
    }

    tr:nth-child(3) td {
      color: #cd7f32;
    }

    /* =========================
       MATCH CARDS
    ========================== */

    .title {
      margin: 25px 0 10px;
      font-size: 18px;
      color: #00ff88;
      letter-spacing: 1px;
    }

    .match {
      background: linear-gradient(145deg, #151515, #0d0d0d);
      padding: 14px 18px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #1c1c1c;
      transition: 0.2s;
    }

    .match:hover {
      transform: scale(1.01);
      border-color: #00ff88;
    }

    .score {
      font-size: 18px;
      font-weight: bold;
      color: #00ff88;
      min-width: 80px;
      text-align: center;
    }

    .team {
      width: 40%;
    }

  </style>
</head>

<body>

<header>⚽ FUTCAT LIVE</header>

<div class="container">

  <select id="liga" onchange="loadData()">
    <option value="">Todas las ligas</option>
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <div class="title">📊 Clasificación</div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div class="title">⚽ Partidos</div>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

async function loadData() {

  const liga = document.getElementById("liga").value;

  try {

    // =====================
    // CLASIFICACIÓN
    // =====================
    const res = await fetch(`${API}/clasificacion?liga=${liga}`);
    const json = await res.json();

    const tabla = document.getElementById("tabla");

    if (!json.data) {
      tabla.innerHTML = "<tr><td colspan='7'>Sin datos</td></tr>";
      return;
    }

    tabla.innerHTML = json.data.map((t,i)=>`
      <tr>
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `).join("");

    // =====================
    // PARTIDOS
    // =====================
    const res2 = await fetch(`${API}/partidos?liga=${liga}`);
    const json2 = await res2.json();

    const partidos = document.getElementById("partidos");

    if (!json2.data) {
      partidos.innerHTML = "Sin partidos";
      return;
    }

    partidos.innerHTML = json2.data.map(p=>`
      <div class="match">
        <div class="team">${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div class="team" style="text-align:right">${p.visitante}</div>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
  }
}

loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
