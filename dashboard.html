<!DOCTYPE html>
<html>
<head>
  <title>TERRITORI FUTCAT LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
    }

    header {
      padding: 16px;
      text-align: center;
      background: #0f0f0f;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    /* ======================
       SELECT LIGAS
    ====================== */

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #151515;
      color: white;
      border: 1px solid #222;
      border-radius: 8px;
    }

    /* ======================
       TABLE PRO
    ====================== */

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f0f0f;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      color: #00ff88;
      padding: 12px;
      background: #111;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #1f1f1f;
    }

    tr:hover td {
      background: #161616;
    }

    /* 🟢 ASCENSO */
    tr.green td {
      color: #00ff88 !important;
      font-weight: bold;
    }

    /* 🟡 MEDIA */
    tr.yellow td {
      color: #ffd166 !important;
    }

    /* 🔴 DESCENSO */
    tr.red td {
      color: #ff4d4d !important;
    }

    /* 🏆 TOP 3 highlight */
    tr:nth-child(1) td {
      box-shadow: inset 0 0 10px rgba(255,215,0,0.1);
    }

    /* ======================
       MATCH CARDS PRO
    ====================== */

    .match {
      background: linear-gradient(145deg, #151515, #0c0c0c);
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }

    .match:hover {
      transform: scale(1.01);
      border-color: #00ff88;
    }

    .team {
      width: 40%;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
      font-size: 18px;
      min-width: 80px;
      text-align: center;
    }

    .live {
      text-align: center;
      color: #00ff88;
      font-size: 12px;
      margin-bottom: 10px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

  </style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div class="live">🔴 LIVE DATA</div>

  <select id="liga" onchange="loadData()">
    <option value="1">Lliga Elit</option>
    <option value="2">Primera Catalana</option>
    <option value="3">Segunda Catalana</option>
  </select>

  <h3>📊 Clasificación</h3>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

async function loadData() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(`${API}/clasificacion?liga=${liga}`);
  const json = await res.json();

  const data = json.data || [];
  const total = data.length;

  document.getElementById("tabla").innerHTML = data.map((t,i)=>{

    let cls = "";

    if (i < total * 0.25) cls = "green";
    else if (i > total * 0.75) cls = "red";
    else cls = "yellow";

    return `
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  }).join("");

  const res2 = await fetch(`${API}/partidos?liga=${liga}`);
  const json2 = await res2.json();

  document.getElementById("partidos").innerHTML = (json2.data || []).map(p=>`
    <div class="match">
      <div class="team">${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div class="team" style="text-align:right">${p.visitante}</div>
    </div>
  `).join("");

}

loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
