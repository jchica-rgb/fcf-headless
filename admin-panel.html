<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT MATCH CONTROL</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  background: #111;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid #222;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
  box-sizing: border-box;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #00cc6a;
}

.row {
  display: flex;
  gap: 10px;
}

.row input {
  flex: 1;
}

.match-item {
  background: #151515;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.small-btn {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
}

</style>
</head>

<body>

<header>⚽ FUTCAT MATCH CONTROL</header>

<div class="container">

  <!-- LIGA -->
  <div class="card">
    <h3>🏆 Liga</h3>
    <select id="liga"></select>
  </div>

  <!-- FORM -->
  <div class="card">
    <h3>➕ / ✏️ Partido</h3>

    <input id="jornada" placeholder="Jornada">

    <select id="local"></select>
    <select id="visitante"></select>

    <div class="row">
      <input id="gl" type="number" placeholder="Goles local">
      <input id="gv" type="number" placeholder="Goles visitante">
    </div>

    <button onclick="saveMatch()">GUARDAR PARTIDO</button>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h3>✏️ Editar partidos</h3>
    <div id="listaPartidos"></div>
  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let equipos = [];
let partidos = [];
let editRow = null;

/* ======================
   LIGAS
====================== */

async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  sel.onchange = () => {
    loadEquipos();
    loadPartidos();
  };

  loadEquipos();
  loadPartidos();
}

/* ======================
   EQUIPOS
====================== */

async function loadEquipos() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/equipos?liga=" + liga);
  const json = await res.json();

  equipos = json.data;

  const local = document.getElementById("local");
  const visitante = document.getElementById("visitante");

  local.innerHTML = "";
  visitante.innerHTML = "";

  equipos.forEach(e => {

    const o1 = document.createElement("option");
    o1.value = e;
    o1.textContent = e;

    const o2 = o1.cloneNode(true);

    local.appendChild(o1);
    visitante.appendChild(o2);
  });
}

/* ======================
   PARTIDOS LISTA
====================== */

async function loadPartidos() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/partidos?liga=" + liga);
  const json = await res.json();

  partidos = json.data;

  const div = document.getElementById("listaPartidos");
  div.innerHTML = "";

  partidos.forEach(p => {

    const el = document.createElement("div");
    el.className = "match-item";

    el.innerHTML = `
      <div>
        <b>${p.local}</b> ${p.goles_local} - ${p.goles_visitante} <b>${p.visitante}</b>
        <br>
        Jornada: ${p.jornada}
      </div>
      <button class="small-btn" onclick="editMatch(${p.id})">EDITAR</button>
    `;

    div.appendChild(el);
  });
}

/* ======================
   EDITAR
====================== */

function editMatch(id) {

  const p = partidos.find(x => x.id === id);

  if (!p) return;

  editRow = id;

  document.getElementById("jornada").value = p.jornada;
  document.getElementById("local").value = p.local;
  document.getElementById("visitante").value = p.visitante;
  document.getElementById("gl").value = p.goles_local;
  document.getElementById("gv").value = p.goles_visitante;
}

/* ======================
   GUARDAR (CREATE + UPDATE FIX)
====================== */

async function saveMatch() {

  const body = {
    liga: document.getElementById("liga").value,
    jornada: document.getElementById("jornada").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: Number(document.getElementById("gl").value),
    goles_visitante: Number(document.getElementById("gv").value)
  };

  let url = "/partido";

  // 🔥 CLAVE: si editRow existe → UPDATE
  if (editRow !== null) {
    url = "/partido/update";
    body.row = editRow;
  }

  const res = await fetch(API + url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (data.ok) {

    alert("✔ Guardado correctamente");

    editRow = null;

    document.getElementById("jornada").value = "";
    document.getElementById("gl").value = "";
    document.getElementById("gv").value = "";

    loadPartidos();

  } else {
    alert(data.error || "Error");
  }
}

/* ======================
   INIT
====================== */

loadLigas();

</script>

</body>
</html>
