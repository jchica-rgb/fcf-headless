<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT ADMIN PANEL</title>

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{text-align:center}

.layout{
  display:flex;
  gap:20px;
}

.col{
  flex:1;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* FIELD */
.field{margin-bottom:10px}

label{
  display:block;
  font-size:12px;
  color:#aaa;
  margin-bottom:4px;
}

input, select{
  width:100%;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  border-radius:6px;
}

/* MATCH */
.match{
  background:#151515;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
}

.small{font-size:12px;opacity:0.7}

/* LOCKED STYLE */
.locked{
  opacity:0.4;
  pointer-events:none;
}

.notice{
  font-size:12px;
  color:#ffcc00;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ FUTCAT ADMIN PANEL</h1>

<div class="layout">

<!-- ================= CREAR ================= -->
<div class="col">

<h3>➕ Crear Partido</h3>

<div class="field">
<label>Liga</label>
<select id="liga"></select>
</div>

<div class="field">
<label>Temporada</label>
<select id="temporada"></select>
</div>

<div class="field">
<label>Local</label>
<select id="local"></select>
</div>

<div class="field">
<label>Visitante</label>
<select id="visitante"></select>
</div>

<div class="field">
<label>Jornada</label>
<input id="jornada">
</div>

<div class="field">
<label>Goles Local</label>
<input id="gl">
</div>

<div class="field">
<label>Goles Visitante</label>
<input id="gv">
</div>

<button onclick="crear()">Guardar Partido</button>

</div>

<!-- ================= LISTA ================= -->
<div class="col">

<h3>📋 Partidos</h3>

<div class="field">
<label>Filtrar Liga</label>
<select id="filtroLiga"></select>
</div>

<div class="field">
<label>Filtrar Temporada</label>
<select id="filtroTemporada"></select>
</div>

<div id="lista"></div>

</div>

<!-- ================= EDIT ================= -->
<div class="col" id="editPanel">

<h3>✏️ Editar Partido</h3>

<div class="notice" id="lockNotice"></div>

<input id="editRow" placeholder="row">

<input id="editJornada">
<input id="editLocal">
<input id="editVisitante">
<input id="editGL">
<input id="editGV">

<button onclick="update()">Actualizar</button>

</div>

</div>
</div>

<script>

const API="https://fcf-headless.onrender.com";

let ligas=[];
let equipos=[];
let partidos=[];
let temporadaActiva=null;

/* ================= INIT ================= */

async function init(){

  const r=await fetch(API+"/ligas");
  ligas=(await r.json()).data;

  fillLigas();
  loadTemporadas();
}

/* ================= LIGAS ================= */

function fillLigas(){

  ["liga","filtroLiga"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";
    ligas.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l.id;
      opt.textContent=l.nombre;
      sel.appendChild(opt);
    });
  });
}

/* ================= EQUIPOS ================= */

async function loadEquipos(){

  const liga=document.getElementById("liga").value;

  const r=await fetch(API+"/equipos?liga="+liga);
  equipos=(await r.json()).data;

  const local=document.getElementById("local");
  const visitante=document.getElementById("visitante");

  local.innerHTML="";
  visitante.innerHTML="";

  equipos.forEach(e=>{
    local.innerHTML+=`<option>${e}</option>`;
    visitante.innerHTML+=`<option>${e}</option>`;
  });
}

/* ================= TEMPORADAS + ACTIVA ================= */

async function loadTemporadas(){

  const [t,a]=await Promise.all([
    fetch(API+"/temporadas"),
    fetch(API+"/temporada-activa")
  ]);

  const temporadas=(await t.json()).data;
  const activa=(await a.json()).data;

  temporadaActiva=activa;

  const sel=document.getElementById("temporada");
  const sel2=document.getElementById("filtroTemporada");

  sel.innerHTML="";
  sel2.innerHTML="";

  temporadas.forEach(s=>{
    sel.innerHTML+=`<option>${s}</option>`;
    sel2.innerHTML+=`<option>${s}</option>`;
  });

  sel.value=activa;
  sel2.value=activa;

  await loadEquipos();
  loadPartidos();
}

/* ================= LOAD ================= */

async function loadPartidos(){

  const liga=document.getElementById("filtroLiga").value;
  const temporada=document.getElementById("filtroTemporada").value;

  const r=await fetch(API+
    "/partidos?liga="+liga+"&temporada="+temporada);

  partidos=(await r.json()).data;

  render();
}

/* ================= RENDER ================= */

function render(){

  const div=document.getElementById("lista");
  div.innerHTML="";

  partidos.forEach(p=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <b>${p.local}</b> ${p.goles_local}-${p.goles_visitante} <b>${p.visitante}</b>
      <div class="small">J${p.jornada} | ${p.temporada}</div>
    `;

    el.onclick=()=>fillEdit(p);

    div.appendChild(el);
  });
}

/* ================= EDIT + BLOQUEO ================= */

function fillEdit(p){

  document.getElementById("editRow").value=p.row;

  document.getElementById("editJornada").value=p.jornada;
  document.getElementById("editLocal").value=p.local;
  document.getElementById("editVisitante").value=p.visitante;
  document.getElementById("editGL").value=p.goles_local;
  document.getElementById("editGV").value=p.goles_visitante;

  const panel=document.getElementById("editPanel");
  const notice=document.getElementById("lockNotice");

  if(p.temporada!==temporadaActiva){

    panel.classList.add("locked");
    notice.innerText="🔒 Partido bloqueado (temporada histórica)";
  }else{
    panel.classList.remove("locked");
    notice.innerText="";
  }
}

/* ================= CREATE ================= */

async function crear(){

  const data={
    liga:liga.value,
    temporada:temporada.value,
    jornada:jornada.value,
    local:local.value,
    visitante:visitante.value,
    goles_local:gl.value,
    goles_visitante:gv.value
  };

  await fetch(API+"/partido",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= UPDATE ================= */

async function update(){

  const row=editRow.value;

  if(!row){
    alert("Selecciona partido");
    return;
  }

  const p = partidos.find(x=>x.row==row);

  if(p.temporada!==temporadaActiva){
    alert("❌ No se pueden modificar temporadas históricas");
    return;
  }

  await fetch(API+"/partido/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      row,
      liga:filtroLiga.value,
      jornada:editJornada.value,
      local:editLocal.value,
      visitante:editVisitante.value,
      goles_local:editGL.value,
      goles_visitante:editGV.value
    })
  });

  loadPartidos();
}

/* ================= EVENTS ================= */

document.addEventListener("change",e=>{
  if(e.target.id==="liga"){
    loadEquipos();
  }
  if(e.target.id==="filtroLiga" || e.target.id==="filtroTemporada"){
    loadPartidos();
  }
});

init();

</script>

</body>
</html>
