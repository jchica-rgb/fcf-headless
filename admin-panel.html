<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT ADMIN PANEL</title>

<style>

/* ================= BASE ================= */

* {
  box-sizing: border-box;
}

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

/* ================= LAYOUT (FIXED) ================= */

.layout{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

/* 🔥 IZQUIERDA (CREAR) */
.col-left{
  flex:0 0 30%;
  background:#111;
  padding:15px;
  border-radius:10px;
  min-width:0;
}

/* 🔥 CENTRO (PARTIDOS - MÁS GRANDE) */
.col-center{
  flex:0 0 45%;
  background:#111;
  padding:15px;
  border-radius:10px;
  min-width:0;
}

/* 🔥 DERECHA (EDITAR) */
.col-right{
  flex:0 0 25%;
  background:#111;
  padding:15px;
  border-radius:10px;
  min-width:0;
}

/* ================= INPUTS ================= */

input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* evita overflow raro */
input::placeholder{
  color:#777;
}

/* ================= BOTONES ================= */

button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
  border-radius:6px;
}

/* ================= LISTA PARTIDOS ================= */

.match{
  background:#151515;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.match:hover{
  transform:scale(1.02);
  background:#1c1c1c;
}

.small{
  font-size:12px;
  opacity:0.7;
}

/* ================= TITLES ================= */

.section-title{
  font-weight:bold;
  margin-bottom:10px;
  font-size:14px;
}

hr{
  border:0;
  height:1px;
  background:#222;
  margin:10px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ FUTCAT ADMIN PANEL</h1>

<div class="layout">

<!-- ================= LEFT (CREAR) ================= -->
<div class="col-left">

  <div class="section-title">➕ Crear Partido</div>
  <hr>

  <select id="liga"></select>
  <select id="temporada"></select>

  <input id="jornada" placeholder="Jornada">
  <input id="local" placeholder="Local">
  <input id="visitante" placeholder="Visitante">
  <input id="gl" placeholder="Goles Local">
  <input id="gv" placeholder="Goles Visitante">

  <button onclick="crear()">Guardar Partido</button>

</div>

<!-- ================= CENTER (PARTIDOS BIG) ================= -->
<div class="col-center">

  <div class="section-title">📋 Partidos</div>
  <hr>

  <select id="filtroLiga"></select>
  <select id="filtroTemporada"></select>

  <div id="lista"></div>

</div>

<!-- ================= RIGHT (EDIT) ================= -->
<div class="col-right">

  <div class="section-title">✏️ Editar Partido</div>
  <hr>

  <input id="editRow" placeholder="Fila Sheet">

  <input id="editJornada">
  <input id="editLocal">
  <input id="editVisitante">
  <input id="editGL">
  <input id="editGV">

  <button onclick="update()">Actualizar</button>

</div>

</div>
</div>

<script>

const API = "https://fcf-headless.onrender.com";

let ligas=[];
let partidos=[];

/* ================= INIT ================= */

async function init(){

  const r=await fetch(API+"/ligas");
  const j=await r.json();

  ligas=j.data;

  fillSelects();
  loadPartidos();
}

/* ================= SELECTS ================= */

function fillSelects(){

  ["liga","filtroLiga"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";

    ligas.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l.id;
      opt.textContent=l.nombre;
      sel.appendChild(opt);
    });
  });

  const seasons=["2023-24","2024-25","2025-26"];

  ["temporada","filtroTemporada"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";

    seasons.forEach(s=>{
      const opt=document.createElement("option");
      opt.value=s;
      opt.textContent=s;
      sel.appendChild(opt);
    });
  });
}

/* ================= LOAD ================= */

async function loadPartidos(){

  const liga=document.getElementById("filtroLiga").value;
  const temporada=document.getElementById("filtroTemporada").value;

  const r=await fetch(API+
    "/partidos?liga="+liga+"&temporada="+temporada);

  const j=await r.json();

  partidos=j.data;

  render();
}

/* ================= RENDER ================= */

function render(){

  const div=document.getElementById("lista");
  div.innerHTML="";

  partidos.forEach((p,i)=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <b>${p.local}</b> ${p.goles_local}-${p.goles_visitante} <b>${p.visitante}</b>
      <div class="small">J${p.jornada} | ${p.temporada}</div>
    `;

    el.onclick=()=>fillEdit(p,i+2);

    div.appendChild(el);
  });
}

/* ================= CREATE ================= */

async function crear(){

  const data={
    liga:document.getElementById("liga").value,
    temporada:document.getElementById("temporada").value,
    jornada:document.getElementById("jornada").value,
    local:document.getElementById("local").value,
    visitante:document.getElementById("visitante").value,
    goles_local:document.getElementById("gl").value,
    goles_visitante:document.getElementById("gv").value
  };

  await fetch(API+"/partido",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EDIT ================= */

function fillEdit(p,row){

  document.getElementById("editRow").value=row;
  document.getElementById("editJornada").value=p.jornada;
  document.getElementById("editLocal").value=p.local;
  document.getElementById("editVisitante").value=p.visitante;
  document.getElementById("editGL").value=p.goles_local;
  document.getElementById("editGV").value=p.goles_visitante;
}

/* ================= UPDATE ================= */

async function update(){

  const data={
    row:document.getElementById("editRow").value,
    liga:document.getElementById("filtroLiga").value,
    jornada:document.getElementById("editJornada").value,
    local:document.getElementById("editLocal").value,
    visitante:document.getElementById("editVisitante").value,
    goles_local:document.getElementById("editGL").value,
    goles_visitante:document.getElementById("editGV").value
  };

  await fetch(API+"/partido/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EVENTS ================= */

document.addEventListener("change",(e)=>{
  if(e.target.id==="filtroLiga" || e.target.id==="filtroTemporada"){
    loadPartidos();
  }
});

init();

</script>

</body>
</html>
