<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin FUTCAT V2</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  background: #111;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid #222;
}

select, input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc6a;
}

.row {
  display: flex;
  gap: 10px;
}

.row select, .row input {
  flex: 1;
}

</style>
</head>

<body>

<header>⚽ ADMIN PANEL V2 - TERRITORI FUTCAT</header>

<div class="container">

  <!-- LIGA -->
  <div class="card">
    <h3>🏆 Liga activa</h3>
    <select id="liga"></select>
  </div>

  <!-- PARTIDO -->
  <div class="card">
    <h3>➕ Nuevo partido</h3>

    <input id="jornada" placeholder="Jornada">

    <select id="local"></select>
    <select id="visitante"></select>

    <div class="row">
      <input id="gl" type="number" placeholder="Local">
      <input id="gv" type="number" placeholder="Visitante">
    </div>

    <button onclick="saveMatch()">GUARDAR PARTIDO</button>
  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let equiposCache = [];

/* ======================
   CARGAR LIGAS
====================== */

async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const liga = document.getElementById("liga");

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    liga.appendChild(opt);
  });

  liga.onchange = loadEquipos;

  loadEquipos();
}

/* ======================
   CARGAR EQUIPOS
   (desde clasificación)
====================== */

async function loadEquipos() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/clasificacion?liga=" + liga);
  const json = await res.json();

  equiposCache = json.data.map(e => e.equipo);

  const local = document.getElementById("local");
  const visitante = document.getElementById("visitante");

  local.innerHTML = "";
  visitante.innerHTML = "";

  equiposCache.forEach(e => {

    const opt1 = document.createElement("option");
    opt1.value = e;
    opt1.textContent = e;

    const opt2 = opt1.cloneNode(true);

    local.appendChild(opt1);
    visitante.appendChild(opt2);
  });
}

/* ======================
   GUARDAR PARTIDO
====================== */

async function saveMatch() {

  const liga = document.getElementById("liga").value;
  const jornada = document.getElementById("jornada").value;
  const local = document.getElementById("local").value;
  const visitante = document.getElementById("visitante").value;
  const gl = Number(document.getElementById("gl").value);
  const gv = Number(document.getElementById("gv").value);

  // VALIDACIÓN
  if (!liga || !jornada || !local || !visitante) {
    alert("Faltan datos");
    return;
  }

  if (gl < 0 || gv < 0) {
    alert("Goles inválidos");
    return;
  }

  const res = await fetch(API + "/partido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({
      liga,
      jornada,
      local,
      visitante,
      goles_local: gl,
      goles_visitante: gv
    })
  });

  const data = await res.json();

  if (data.ok) {
    alert("✔ Partido guardado");
    document.getElementById("jornada").value = "";
    document.getElementById("gl").value = "";
    document.getElementById("gv").value = "";
  } else {
    alert("Error al guardar");
  }
}

loadLigas();

</script>

</body>
</html>
