<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT MATCH CONTROL</title>

<style>

body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header {
  background:#111;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* ===== LAYOUT PRINCIPAL ===== */

.wrapper {
  display:flex;
  height:calc(100vh - 60px);
}

/* IZQUIERDA */
.left {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* DERECHA */
.right {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* LINEA CENTRAL VERDE */
.divider {
  width:3px;
  background:linear-gradient(to bottom, transparent, #00ff88, transparent);
  box-shadow:0 0 12px #00ff88;
}

/* CARDS */
.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  border:1px solid #222;
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
  box-sizing:border-box;
  border-radius:6px;
}

/* BOTONES */
button {
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

button:hover {
  background:#00cc6a;
}

/* LISTA PARTIDOS */
.match {
  background:#151515;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small-btn {
  width:auto;
  padding:6px 10px;
  font-size:12px;
}

</style>
</head>

<body>

<header>⚽ FUTCAT MATCH CONTROL</header>

<div class="wrapper">

  <!-- ================= LEFT ================= -->
  <div class="left">

    <div class="card">
      <h3>🏆 Liga</h3>
      <select id="liga"></select>
    </div>

    <div class="card">
      <h3>➕ Nuevo / Editar partido</h3>

      <input id="jornada" placeholder="Jornada">

      <select id="local"></select>
      <select id="visitante"></select>

      <input id="gl" type="number" placeholder="Goles local">
      <input id="gv" type="number" placeholder="Goles visitante">

      <button onclick="saveMatch()">GUARDAR</button>
    </div>

  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- ================= RIGHT ================= -->
  <div class="right">

    <div class="card">
      <h3>📋 Partidos (todos)</h3>
      <div id="listaPartidos"></div>
    </div>

  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let partidos = [];
let equipos = [];
let editRow = null;

/* ================= LIGAS ================= */

async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  sel.onchange = () => {
    loadEquipos();
    loadPartidos();
  };

  loadEquipos();
  loadPartidos();
}

/* ================= EQUIPOS ================= */

async function loadEquipos() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/equipos?liga=" + liga);
  const json = await res.json();

  equipos = json.data;

  const local = document.getElementById("local");
  const visitante = document.getElementById("visitante");

  local.innerHTML = "";
  visitante.innerHTML = "";

  equipos.forEach(e => {

    const o1 = document.createElement("option");
    o1.value = e;
    o1.textContent = e;

    const o2 = o1.cloneNode(true);

    local.appendChild(o1);
    visitante.appendChild(o2);
  });
}

/* ================= PARTIDOS ================= */

async function loadPartidos() {

  editRow = null;

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/partidos?liga=" + liga);
  const json = await res.json();

  partidos = json.data;

  const div = document.getElementById("listaPartidos");
  div.innerHTML = "";

  partidos.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>
        <b>${p.local}</b> ${p.goles_local} - ${p.goles_visitante} <b>${p.visitante}</b><br>
        Jornada: ${p.jornada}
      </div>
      <button class="small-btn" onclick="edit(${p.id})">EDITAR</button>
    `;

    div.appendChild(el);
  });
}

/* ================= EDIT ================= */

function edit(id) {

  const p = partidos.find(x => x.id === id);

  editRow = id;

  document.getElementById("jornada").value = p.jornada;
  document.getElementById("local").value = p.local;
  document.getElementById("visitante").value = p.visitante;
  document.getElementById("gl").value = p.goles_local;
  document.getElementById("gv").value = p.goles_visitante;
}

/* ================= SAVE ================= */

async function saveMatch() {

  const body = {
    liga: document.getElementById("liga").value,
    jornada: document.getElementById("jornada").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: Number(document.getElementById("gl").value),
    goles_visitante: Number(document.getElementById("gv").value)
  };

  let url = "/partido";

  if (editRow !== null) {
    url = "/partido/update";
    body.row = editRow;
  }

  await fetch(API + url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  editRow = null;

  loadPartidos();
}

loadLigas();

</script>

</body>
</html>
