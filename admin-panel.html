<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT ADMIN PANEL</title>

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{text-align:center}

/* LAYOUT */
.layout{
  display:flex;
  gap:20px;
}

.col-left{flex:0 0 30%; background:#111; padding:15px; border-radius:10px;}
.col-center{flex:0 0 45%; background:#111; padding:15px; border-radius:10px;}
.col-right{flex:0 0 25%; background:#111; padding:15px; border-radius:10px;}

/* FIELDS */
.field{margin-bottom:10px;}

label{
  display:block;
  font-size:12px;
  color:#aaa;
  margin-bottom:4px;
}

input, select{
  width:100%;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  border-radius:6px;
}

/* MATCH */
.match{
  background:#151515;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
}

/* SMALL */
.small{font-size:12px;opacity:0.7}

</style>
</head>

<body>

<div class="container">

<h1>⚽ FUTCAT ADMIN PANEL</h1>

<div class="layout">

<!-- ================= CREAR ================= -->
<div class="col-left">

<h3>➕ Crear Partido</h3>

<div class="field">
<label>Liga</label>
<select id="liga"></select>
</div>

<div class="field">
<label>Temporada</label>
<select id="temporada"></select>
</div>

<div class="field">
<label>Local</label>
<select id="local"></select>
</div>

<div class="field">
<label>Visitante</label>
<select id="visitante"></select>
</div>

<div class="field">
<label>Jornada</label>
<input id="jornada">
</div>

<div class="field">
<label>Goles Local</label>
<input id="gl">
</div>

<div class="field">
<label>Goles Visitante</label>
<input id="gv">
</div>

<button onclick="crear()">Guardar Partido</button>

</div>

<!-- ================= LISTA ================= -->
<div class="col-center">

<h3>📋 Partidos</h3>

<select id="filtroLiga"></select>
<select id="filtroTemporada"></select>

<div id="lista"></div>

</div>

<!-- ================= EDIT ================= -->
<div class="col-right">

<h3>✏️ Editar</h3>

<input id="editRow" placeholder="row">

<input id="editJornada">
<input id="editLocal">
<input id="editVisitante">
<input id="editGL">
<input id="editGV">

<button onclick="update()">Actualizar</button>

</div>

</div>
</div>

<script>

const API="https://fcf-headless.onrender.com";

let ligas=[];
let equipos=[];
let partidos=[];

/* ================= INIT ================= */

async function init(){

  const r=await fetch(API+"/ligas");
  const j=await r.json();

  ligas=j.data;

  fillLigas();
  loadTemporadas();
}

/* ================= LIGAS ================= */

function fillLigas(){

  ["liga","filtroLiga"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";

    ligas.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l.id;
      opt.textContent=l.nombre;
      sel.appendChild(opt);
    });
  });
}

/* ================= EQUIPOS (FIX IMPORTANTE) ================= */

async function loadEquipos(){

  const liga=document.getElementById("liga").value;

  const r=await fetch(API+"/equipos?liga="+liga);
  const j=await r.json();

  equipos=j.data;

  const local=document.getElementById("local");
  const visitante=document.getElementById("visitante");

  local.innerHTML="";
  visitante.innerHTML="";

  equipos.forEach(e=>{

    const o1=document.createElement("option");
    const o2=document.createElement("option");

    o1.value=o2.value=e;
    o1.textContent=o2.textContent=e;

    local.appendChild(o1);
    visitante.appendChild(o2);
  });
}

/* ================= TEMPORADAS ================= */

async function loadTemporadas(){

  const r=await fetch(API+"/temporadas");
  const j=await r.json();

  const sel=document.getElementById("temporada");
  const sel2=document.getElementById("filtroTemporada");

  sel.innerHTML="";
  sel2.innerHTML="";

  j.data.forEach(s=>{

    const o1=document.createElement("option");
    const o2=document.createElement("option");

    o1.value=o2.value=s;
    o1.textContent=o2.textContent=s;

    sel.appendChild(o1);
    sel2.appendChild(o2);
  });

  await loadEquipos();
  loadPartidos();
}

/* ================= DUPLICADOS CHECK ================= */

function isDuplicate(nuevo){

  return partidos.some(p=>
    p.local===nuevo.local &&
    p.visitante===nuevo.visitante &&
    p.jornada===nuevo.jornada &&
    p.temporada===nuevo.temporada
  );
}

/* ================= CREAR ================= */

async function crear(){

  const data={
    liga:document.getElementById("liga").value,
    temporada:document.getElementById("temporada").value,
    jornada:document.getElementById("jornada").value,
    local:document.getElementById("local").value,
    visitante:document.getElementById("visitante").value,
    goles_local:document.getElementById("gl").value,
    goles_visitante:document.getElementById("gv").value
  };

  if(isDuplicate(data)){
    alert("❌ Partido duplicado");
    return;
  }

  await fetch(API+"/partido",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= LOAD PARTIDOS ================= */

async function loadPartidos(){

  const liga=document.getElementById("filtroLiga").value;
  const temporada=document.getElementById("filtroTemporada").value;

  const r=await fetch(API+"/partidos?liga="+liga+"&temporada="+temporada);
  const j=await r.json();

  partidos=j.data;

  render();
}

/* ================= RENDER ================= */

function render(){

  const div=document.getElementById("lista");
  div.innerHTML="";

  partidos.forEach((p,i)=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <b>${p.local}</b> ${p.goles_local}-${p.goles_visitante} <b>${p.visitante}</b>
      <div class="small">J${p.jornada} | ${p.temporada}</div>
    `;

    el.onclick=()=>fillEdit(p,i+2);

    div.appendChild(el);
  });
}

/* ================= EDIT FIX ================= */

function fillEdit(p,row){

  document.getElementById("editRow").value=row;
  document.getElementById("editJornada").value=p.jornada;
  document.getElementById("editLocal").value=p.local;
  document.getElementById("editVisitante").value=p.visitante;
  document.getElementById("editGL").value=p.goles_local;
  document.getElementById("editGV").value=p.goles_visitante;
}

/* ================= UPDATE FIX REAL ================= */

async function update(){

  const row=document.getElementById("editRow").value;

  if(!row){
    alert("❌ Selecciona un partido");
    return;
  }

  const data={
    row,
    liga:document.getElementById("filtroLiga").value,
    jornada:document.getElementById("editJornada").value,
    local:document.getElementById("editLocal").value,
    visitante:document.getElementById("editVisitante").value,
    goles_local:document.getElementById("editGL").value,
    goles_visitante:document.getElementById("editGV").value
  };

  await fetch(API+"/partido/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EVENTS ================= */

document.addEventListener("change",e=>{

  if(e.target.id==="filtroLiga"){
    loadEquipos();
  }

  if(e.target.id==="filtroLiga" || e.target.id==="filtroTemporada"){
    loadPartidos();
  }
});

init();

</script>

</body>
</html>
