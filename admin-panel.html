<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT ADMIN PANEL</title>

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{text-align:center;margin-bottom:20px}

.layout{
  display:flex;
  gap:20px;
}

.col{
  flex:1;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* FIELD */
.field{margin-bottom:10px}

label{
  display:block;
  font-size:12px;
  color:#aaa;
  margin-bottom:4px;
}

input, select{
  width:100%;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  border-radius:6px;
}

/* MATCH */
.match{
  background:#151515;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  cursor:pointer;
}

.small{font-size:12px;opacity:0.7}

</style>
</head>

<body>

<div class="container">

<h1>⚽ FUTCAT ADMIN PANEL</h1>

<div class="layout">

<!-- ================= CREAR ================= -->
<div class="col">

<h3>➕ Crear Partido</h3>

<div class="field">
<label>Liga</label>
<select id="liga"></select>
</div>

<div class="field">
<label>Temporada</label>
<select id="temporada"></select>
</div>

<div class="field">
<label>Local</label>
<select id="local"></select>
</div>

<div class="field">
<label>Visitante</label>
<select id="visitante"></select>
</div>

<div class="field">
<label>Jornada</label>
<input id="jornada">
</div>

<div class="field">
<label>Goles Local</label>
<input id="gl">
</div>

<div class="field">
<label>Goles Visitante</label>
<input id="gv">
</div>

<button onclick="crear()">Guardar Partido</button>

</div>

<!-- ================= LISTA ================= -->
<div class="col">

<h3>📋 Partidos</h3>

<div class="field">
<label>Filtrar Liga</label>
<select id="filtroLiga"></select>
</div>

<div class="field">
<label>Filtrar Temporada</label>
<select id="filtroTemporada"></select>
</div>

<div id="lista"></div>

</div>

<!-- ================= EDIT ================= -->
<div class="col">

<h3>✏️ Editar Partido</h3>

<!-- 🔒 ROW OCULTO -->
<input type="hidden" id="editRow">

<div class="field">
<label>Liga</label>
<select id="editLiga"></select>
</div>

<div class="field">
<label>Jornada</label>
<input id="editJornada">
</div>

<div class="field">
<label>Local</label>
<select id="editLocal"></select>
</div>

<div class="field">
<label>Visitante</label>
<select id="editVisitante"></select>
</div>

<div class="field">
<label>Goles Local</label>
<input id="editGL">
</div>

<div class="field">
<label>Goles Visitante</label>
<input id="editGV">
</div>

<button onclick="update()">Actualizar</button>

</div>

</div>
</div>

<script>

const API="https://fcf-headless.onrender.com";

let ligas=[];
let equipos=[];
let partidos=[];

/* ================= INIT ================= */

async function init(){

  const r=await fetch(API+"/ligas");
  ligas=(await r.json()).data;

  fillLigas();
  loadTemporadas();
}

/* ================= LIGAS ================= */

function fillLigas(){

  ["liga","filtroLiga","editLiga"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";
    ligas.forEach(l=>{
      sel.innerHTML+=`<option value="${l.id}">${l.nombre}</option>`;
    });
  });
}

/* ================= EQUIPOS ================= */

async function loadEquipos(){

  const liga=document.getElementById("liga").value;

  const r=await fetch(API+"/equipos?liga="+liga);
  equipos=(await r.json()).data;

  const local=document.getElementById("local");
  const visitante=document.getElementById("visitante");
  const eLocal=document.getElementById("editLocal");
  const eVisitante=document.getElementById("editVisitante");

  [local,visitante,eLocal,eVisitante].forEach(sel=>{
    sel.innerHTML="";
  });

  equipos.forEach(e=>{
    local.innerHTML+=`<option>${e}</option>`;
    visitante.innerHTML+=`<option>${e}</option>`;
    eLocal.innerHTML+=`<option>${e}</option>`;
    eVisitante.innerHTML+=`<option>${e}</option>`;
  });
}

/* ================= TEMPORADAS ================= */

async function loadTemporadas(){

  const r=await fetch(API+"/temporadas");
  const j=await r.json();

  const sel=document.getElementById("temporada");
  const sel2=document.getElementById("filtroTemporada");

  sel.innerHTML="";
  sel2.innerHTML="";

  j.data.forEach(s=>{
    sel.innerHTML+=`<option>${s}</option>`;
    sel2.innerHTML+=`<option>${s}</option>`;
  });

  await loadEquipos();
  loadPartidos();
}

/* ================= LOAD ================= */

async function loadPartidos(){

  const liga=filtroLiga.value;
  const temporada=filtroTemporada.value;

  const r=await fetch(API+
    "/partidos?liga="+liga+"&temporada="+temporada);

  partidos=(await r.json()).data;

  render();
}

/* ================= RENDER ================= */

function render(){

  lista.innerHTML="";

  partidos.forEach(p=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <b>${p.local}</b> ${p.goles_local}-${p.goles_visitante} <b>${p.visitante}</b>
      <div class="small">J${p.jornada} | ${p.temporada}</div>
    `;

    el.onclick=()=>fillEdit(p);

    lista.appendChild(el);
  });
}

/* ================= EDIT ================= */

function fillEdit(p){

  editRow.value=p.row;
  editLiga.value=p.liga;
  editJornada.value=p.jornada;

  editGL.value=p.goles_local;
  editGV.value=p.goles_visitante;

  editLocal.value=p.local;
  editVisitante.value=p.visitante;
}

/* ================= CREATE ================= */

async function crear(){

  const data={
    liga:liga.value,
    temporada:temporada.value,
    jornada:jornada.value,
    local:local.value,
    visitante:visitante.value,
    goles_local:gl.value,
    goles_visitante:gv.value
  };

  await fetch(API+"/partido",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= UPDATE ================= */

async function update(){

  const data={
    row:editRow.value,
    liga:editLiga.value,
    jornada:editJornada.value,
    local:editLocal.value,
    visitante:editVisitante.value,
    goles_local:editGL.value,
    goles_visitante:editGV.value
  };

  await fetch(API+"/partido/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EVENTS ================= */

document.addEventListener("change",e=>{
  if(e.target.id==="liga"){
    loadEquipos();
  }

  if(e.target.id==="filtroLiga" || e.target.id==="filtroTemporada"){
    loadPartidos();
  }
});

init();

</script>

</body>
</html>
