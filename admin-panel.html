<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Territori FUTCAT</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  background: #111;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid #222;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc6a;
}

#panel {
  display: none;
}

#error {
  color: red;
  text-align: center;
}

</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT ADMIN</header>

<div class="container">

  <div id="error"></div>

  <!-- PANEL REAL -->
  <div id="panel">

    <div class="card">
      <h3>➕ Nuevo Partido</h3>

      <input id="liga" placeholder="Liga (ej: 1a-catalana)">
      <input id="jornada" placeholder="Jornada">
      <input id="local" placeholder="Local">
      <input id="visitante" placeholder="Visitante">
      <input id="gl" type="number" placeholder="Goles local">
      <input id="gv" type="number" placeholder="Goles visitante">

      <button onclick="saveMatch()">Guardar partido</button>
    </div>

  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

/* =========================
   CHECK LOGIN
========================= */

const token = localStorage.getItem("token");

if (!token) {
  document.getElementById("error").innerText =
    "❌ No has iniciado sesión";
} else {
  document.getElementById("panel").style.display = "block";
}

/* =========================
   GUARDAR PARTIDO
========================= */

async function saveMatch() {

  const match = {
    liga: document.getElementById("liga").value,
    jornada: document.getElementById("jornada").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: Number(document.getElementById("gl").value),
    goles_visitante: Number(document.getElementById("gv").value)
  };

  try {

    const res = await fetch(API + "/partido", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": token
      },
      body: JSON.stringify(match)
    });

    const data = await res.json();

    if (data.ok) {
      alert("✅ Partido guardado");

      document.getElementById("local").value = "";
      document.getElementById("visitante").value = "";
      document.getElementById("gl").value = "";
      document.getElementById("gv").value = "";

    } else {
      alert("❌ Error al guardar");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Error de conexión");
  }
}

</script>

</body>
</html>
