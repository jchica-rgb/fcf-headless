<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin FUTCAT V3</title>

<style>

body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header {
  background:#111;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  border:1px solid #222;
}

select, input {
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#00cc6a;
}

.row {
  display:flex;
  gap:10px;
}

.row input {
  flex:1;
}

</style>
</head>

<body>

<header>⚽ ADMIN PANEL V3 - EQUIPOS DESDE SHEETS</header>

<div class="container">

  <!-- LIGA -->
  <div class="card">
    <h3>🏆 Liga</h3>
    <select id="liga"></select>
  </div>

  <!-- PARTIDO -->
  <div class="card">

    <h3>➕ Nuevo partido</h3>

    <input id="jornada" placeholder="Jornada">

    <select id="local"></select>
    <select id="visitante"></select>

    <div class="row">
      <input id="gl" type="number" placeholder="Goles local">
      <input id="gv" type="number" placeholder="Goles visitante">
    </div>

    <button onclick="saveMatch()">GUARDAR PARTIDO</button>

  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let equipos = [];

/* ======================
   LIGAS
====================== */

async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  select.onchange = loadEquipos;

  loadEquipos();
}

/* ======================
   EQUIPOS DESDE SHEET
====================== */

async function loadEquipos() {

  const liga = document.getElementById("liga").value;

  const res = await fetch(API + "/equipos?liga=" + liga);
  const json = await res.json();

  equipos = json.data;

  const local = document.getElementById("local");
  const visitante = document.getElementById("visitante");

  local.innerHTML = "";
  visitante.innerHTML = "";

  equipos.forEach(e => {

    const opt1 = document.createElement("option");
    opt1.value = e;
    opt1.textContent = e;

    const opt2 = opt1.cloneNode(true);

    local.appendChild(opt1);
    visitante.appendChild(opt2);
  });
}

/* ======================
   GUARDAR PARTIDO
====================== */

async function saveMatch() {

  const token = localStorage.getItem("token");

  const match = {
    liga: document.getElementById("liga").value,
    jornada: document.getElementById("jornada").value,
    local: document.getElementById("local").value,
    visitante: document.getElementById("visitante").value,
    goles_local: Number(document.getElementById("gl").value),
    goles_visitante: Number(document.getElementById("gv").value)
  };

  const res = await fetch(API + "/partido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify(match)
  });

  const data = await res.json();

  if (data.ok) {
    alert("✔ Partido guardado");

    document.getElementById("jornada").value = "";
    document.getElementById("gl").value = "";
    document.getElementById("gv").value = "";
  } else {
    alert("Error");
  }
}

loadLigas();

</script>

</body>
</html>
