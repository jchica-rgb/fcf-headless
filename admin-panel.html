<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FUTCAT ADMIN PANEL</title>

<style>

* { box-sizing:border-box; }

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

/* ================= LAYOUT ================= */

.layout{
  display:flex;
  gap:20px;
}

.col-left{
  flex:0 0 30%;
  background:#111;
  padding:15px;
  border-radius:10px;
}

.col-center{
  flex:0 0 45%;
  background:#111;
  padding:15px;
  border-radius:10px;
}

.col-right{
  flex:0 0 25%;
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* ================= FIELDS ================= */

.field{
  margin-bottom:12px;
}

label{
  display:block;
  font-size:12px;
  color:#aaa;
  margin-bottom:4px;
}

input, select{
  width:100%;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
  outline:none;
}

input:focus, select:focus{
  border-color:#00ff88;
}

/* ================= BUTTON ================= */

button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
  margin-top:10px;
}

/* ================= MATCH ================= */

.match{
  background:#151515;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.match:hover{
  transform:scale(1.02);
  background:#1c1c1c;
}

.small{
  font-size:12px;
  opacity:0.7;
}

hr{
  border:0;
  height:1px;
  background:#222;
  margin:10px 0;
}

.section-title{
  font-weight:bold;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ FUTCAT ADMIN PANEL</h1>

<div class="layout">

<!-- ================= CREAR ================= -->
<div class="col-left">

  <div class="section-title">➕ Crear Partido</div>
  <hr>

  <div class="field">
    <label>Liga</label>
    <select id="liga"></select>
  </div>

  <div class="field">
    <label>Temporada (ACTIVA)</label>
    <select id="temporada"></select>
  </div>

  <div class="field">
    <label>Jornada</label>
    <input id="jornada">
  </div>

  <div class="field">
    <label>Local</label>
    <input id="local">
  </div>

  <div class="field">
    <label>Visitante</label>
    <input id="visitante">
  </div>

  <div class="field">
    <label>Goles Local</label>
    <input id="gl">
  </div>

  <div class="field">
    <label>Goles Visitante</label>
    <input id="gv">
  </div>

  <button onclick="crear()">Guardar Partido</button>

</div>

<!-- ================= LISTA ================= -->
<div class="col-center">

  <div class="section-title">📋 Partidos</div>
  <hr>

  <div class="field">
    <label>Filtrar Liga</label>
    <select id="filtroLiga"></select>
  </div>

  <div class="field">
    <label>Filtrar Temporada</label>
    <select id="filtroTemporada"></select>
  </div>

  <div id="lista"></div>

</div>

<!-- ================= EDIT ================= -->
<div class="col-right">

  <div class="section-title">✏️ Editar Partido</div>
  <hr>

  <div class="field">
    <label>Fila Sheet</label>
    <input id="editRow">
  </div>

  <div class="field">
    <label>Jornada</label>
    <input id="editJornada">
  </div>

  <div class="field">
    <label>Local</label>
    <input id="editLocal">
  </div>

  <div class="field">
    <label>Visitante</label>
    <input id="editVisitante">
  </div>

  <div class="field">
    <label>Goles Local</label>
    <input id="editGL">
  </div>

  <div class="field">
    <label>Goles Visitante</label>
    <input id="editGV">
  </div>

  <button onclick="update()">Actualizar</button>

</div>

</div>
</div>

<script>

const API = "https://fcf-headless.onrender.com";

let ligas=[];
let partidos=[];
let temporadaActiva=null;

/* ================= INIT ================= */

async function init(){

  const r = await fetch(API + "/ligas");
  const j = await r.json();

  ligas = j.data;

  fillSelects();
  await loadTemporadas();
}

/* ================= LIGAS ================= */

function fillSelects(){

  ["liga","filtroLiga"].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML="";
    ligas.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l.id;
      opt.textContent=l.nombre;
      sel.appendChild(opt);
    });
  });
}

/* ================= TEMPORADAS (INTELIGENTE) ================= */

async function loadTemporadas(){

  const [t,a] = await Promise.all([
    fetch(API+"/temporadas"),
    fetch(API+"/temporada-activa")
  ]);

  const j = await t.json();
  const ja = await a.json();

  const sel = document.getElementById("temporada");
  const sel2 = document.getElementById("filtroTemporada");

  sel.innerHTML="";
  sel2.innerHTML="";

  j.data.forEach(s=>{

    const opt1=document.createElement("option");
    const opt2=document.createElement("option");

    opt1.value=opt2.value=s;
    opt1.textContent=opt2.textContent=s;

    sel.appendChild(opt1);
    sel2.appendChild(opt2);
  });

  // 🔥 SELECCIÓN INTELIGENTE
  const saved = localStorage.getItem("temporada");
  temporadaActiva = saved || ja.data || j.data[j.data.length-1];

  sel.value = temporadaActiva;
  sel2.value = temporadaActiva;

  localStorage.setItem("temporada", temporadaActiva);

  loadPartidos();
}

/* ================= LOAD ================= */

async function loadPartidos(){

  const liga=document.getElementById("filtroLiga").value;
  const temporada=document.getElementById("filtroTemporada").value;

  const r=await fetch(
    API+"/partidos?liga="+liga+"&temporada="+temporada
  );

  const j=await r.json();

  partidos=j.data;

  render();
}

/* ================= RENDER ================= */

function render(){

  const div=document.getElementById("lista");
  div.innerHTML="";

  partidos.forEach((p,i)=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <b>${p.local}</b> ${p.goles_local}-${p.goles_visitante} <b>${p.visitante}</b>
      <div class="small">J${p.jornada} | ${p.temporada}</div>
    `;

    el.onclick=()=>fillEdit(p,i+2);

    div.appendChild(el);
  });
}

/* ================= CREATE ================= */

async function crear(){

  const temporada=document.getElementById("temporada").value;

  if(!temporada){
    alert("Temporada obligatoria");
    return;
  }

  const data={
    liga:document.getElementById("liga").value,
    temporada,
    jornada:document.getElementById("jornada").value,
    local:document.getElementById("local").value,
    visitante:document.getElementById("visitante").value,
    goles_local:document.getElementById("gl").value,
    goles_visitante:document.getElementById("gv").value
  };

  await fetch(API+"/partido",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EDIT ================= */

function fillEdit(p,row){

  document.getElementById("editRow").value=row;
  document.getElementById("editJornada").value=p.jornada;
  document.getElementById("editLocal").value=p.local;
  document.getElementById("editVisitante").value=p.visitante;
  document.getElementById("editGL").value=p.goles_local;
  document.getElementById("editGV").value=p.goles_visitante;
}

/* ================= UPDATE ================= */

async function update(){

  const data={
    row:document.getElementById("editRow").value,
    liga:document.getElementById("filtroLiga").value,
    jornada:document.getElementById("editJornada").value,
    local:document.getElementById("editLocal").value,
    visitante:document.getElementById("editVisitante").value,
    goles_local:document.getElementById("editGL").value,
    goles_visitante:document.getElementById("editGV").value
  };

  await fetch(API+"/partido/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  loadPartidos();
}

/* ================= EVENTS ================= */

document.addEventListener("change",(e)=>{
  if(e.target.id==="filtroLiga" || e.target.id==="filtroTemporada"){
    loadPartidos();
  }
});

init();

</script>

</body>
</html>
