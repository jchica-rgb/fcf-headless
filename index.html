<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TERRITORI FUTCAT LIVE PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #111;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}

select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

/* 🔥 ESTADOS FIJOS */
.up td {
  background: rgba(0,255,0,0.18) !important;
}

.down td {
  background: rgba(255,0,0,0.18) !important;
}

/* PARTIDOS */
.match {
  background: #151515;
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  border-radius: 6px;
}

.score {
  color: #00ff88;
  font-weight: bold;
}
</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE PRO</header>

<div class="container">

<div id="statusBar">
  <div id="lastChange">📡 Último cambio real: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<select id="liga"></select>

<h3>📊 Clasificación</h3>
<table>
<tbody id="tabla"></tbody>
</table>

<h3>⚽ Partidos</h3>
<div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;

// 🔥 estado anterior REAL
let prevState = new Map();

// ======================
function formatTime(ts) {
  if (!ts) return "--";
  return new Date(ts).toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });
}

// ======================
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");
  select.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  const saved = localStorage.getItem("liga");
  currentLiga = saved || json.data[0].id;
  select.value = currentLiga;

  select.onchange = (e) => {
    currentLiga = e.target.value;
    localStorage.setItem("liga", currentLiga);

    prevState.clear();
    document.getElementById("tabla").innerHTML = "";
    document.getElementById("partidos").innerHTML = "";

    loadData();
  };

  loadData();
}

// ======================
async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  renderTable(clas.data);
  renderMatches(part.data);
  updateStatus(clas.lastUpdate);
}

// ======================
// 🔥 RENDER ESTABLE REAL
// ======================
function renderTable(data) {

  const tbody = document.getElementById("tabla");

  const newState = new Map();

  data.forEach((t, i) => {

    let tr = document.getElementById("row-" + t.equipo);

    const prev = prevState.get(t.equipo);

    let arrow = "";
    let cls = "";

    // 🔥 comparación real
    if (prev) {
      if (t.puntos > prev.puntos) {
        arrow = " 📈";
        cls = "up";
      } else if (t.puntos < prev.puntos) {
        arrow = " 📉";
        cls = "down";
      } else {
        cls = tr?.dataset?.cls || "";
      }
    }

    if (!tr) {
      tr = document.createElement("tr");
      tr.id = "row-" + t.equipo;
      tbody.appendChild(tr);
    }

    tr.dataset.cls = cls;
    tr.className = cls;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    newState.set(t.equipo, t);
  });

  // 🔥 swap limpio de estado
  prevState = new Map(newState);

  // 🔥 orden estable
  data.forEach(t => {
    const row = document.getElementById("row-" + t.equipo);
    if (row) tbody.appendChild(row);
  });
}

// ======================
function renderMatches(matches) {

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  matches.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local ?? 0} - ${p.goles_visitante ?? 0}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

// ======================
function updateStatus(ts) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio real: " + formatTime(ts);

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

// ======================
setInterval(() => {
  if (currentLiga) loadData();
}, 12000);

loadLigas();

</script>

</body>
</html>
