<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  padding: 18px;
  text-align: center;
  background: linear-gradient(90deg, #111, #0a0a0a, #111);
  font-size: 22px;
  font-weight: bold;
  border-bottom: 1px solid rgba(0,255,136,0.15);
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

/* STATUS */
#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}

/* SELECT */
select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

/* ZONES */
.up td { background: rgba(0,255,0,0.18) !important; }
.down td { background: rgba(255,0,0,0.18) !important; }
.mid td { background: rgba(255,255,255,0.04); }

/* MATCHES */
.match {
  background: #151515;
  padding: 12px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  border-radius: 8px;
  border-left: 3px solid rgba(0,255,136,0.35);
}

.match div:first-child { text-align: left; }
.match div:last-child { text-align: right; }

.score {
  color: #00ff88;
  font-weight: bold;
  text-align: center;
  justify-self: center;
  min-width: 80px;
}

/* TITLES */
h3 {
  display: flex;
  align-items: center;
  gap: 10px;
}

h3::after {
  content: "";
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, #00ff88, transparent);
}

/* ANIMATION */
@keyframes flashUp {
  0% { background: rgba(0,255,136,0.35); }
  100% { background: rgba(0,255,0,0.18); }
}

@keyframes flashDown {
  0% { background: rgba(255,0,0,0.35); }
  100% { background: rgba(255,0,0,0.18); }
}

.flash-up td { animation: flashUp 0.8s ease; }
.flash-down td { animation: flashDown 0.8s ease; }

.arrow {
  font-size: 12px;
  margin-left: 5px;
}
</style>
</head>

<body>

<header>⚽ Territori FUTCAT Live</header>

<div class="container">

<div id="statusBar">
  <div id="lastChange">📡 Último cambio real: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<select id="liga"></select>

<h3>📊 Clasificación</h3>

<table>
<thead>
<tr>
  <th>Pos</th>
  <th>Equipo</th>
  <th>Puntos</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<h3>⚽ Partidos</h3>
<div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let lastHash = null;

// ======================
function createHash(data) {
  return data.map(d =>
    `${d.equipo}-${d.puntos}-${d.jugados}`
  ).join("|");
}

// ======================
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  const saved = localStorage.getItem("liga");
  currentLiga = saved || json.data[0].id;
  sel.value = currentLiga;

  sel.onchange = (e) => {
    currentLiga = e.target.value;
    localStorage.setItem("liga", currentLiga);

    document.getElementById("tabla").innerHTML = "";
    document.getElementById("partidos").innerHTML = "";

    lastHash = null;

    loadData();
  };

  loadData();
}

// ======================
async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  const newHash = createHash(clas.data);

  if (newHash === lastHash) {
    updateStatus(clas.lastUpdate);
    return;
  }

  lastHash = newHash;

  renderTable(clas.data);
  renderMatches(part.data);

  updateStatus(clas.lastUpdate);
}

// ======================
function renderTable(data) {

  const tbody = document.getElementById("tabla");

  data = [...data].sort((a, b) =>
    b.puntos - a.puntos || a.equipo.localeCompare(b.equipo)
  );

  data.forEach((t, i) => {

    let tr = document.getElementById("row-" + t.equipo);

    if (!tr) {
      tr = document.createElement("tr");
      tr.id = "row-" + t.equipo;
      tbody.appendChild(tr);
    }

    let oldPos = tr.getAttribute("data-pos");

    if (oldPos !== null) {
      if (parseInt(oldPos) > i) {
        tr.classList.add("flash-up");
      } else if (parseInt(oldPos) < i) {
        tr.classList.add("flash-down");
      }
    }

    tr.setAttribute("data-pos", i);

    let arrow = "";
    if (t.movement === "up") arrow = " <span class='arrow'>📈</span>";
    else if (t.movement === "down") arrow = " <span class='arrow'>📉</span>";

    let cls = "mid";
    if (i < 3) cls = "up";
    else if (i >= data.length - 3) cls = "down";

    tr.className = cls;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;
  });

  setTimeout(() => {
    document.querySelectorAll(".flash-up, .flash-down")
      .forEach(el => {
        el.classList.remove("flash-up");
        el.classList.remove("flash-down");
      });
  }, 900);
}

// ======================
function renderMatches(matches) {

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  matches.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

// ======================
function updateStatus(ts) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio real: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

// ======================
loadLigas();
setInterval(loadData, 10000);

</script>

</body>
</html>
