<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}

select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

/* 🟢 ZONAS (RECUPERADO PRO) */
.up td {
  background: rgba(0,255,0,0.15) !important;
  border-left: 3px solid #00ff88;
}

.down td {
  background: rgba(255,0,0,0.15) !important;
  border-left: 3px solid #ff3b3b;
}

.mid td {
  background: rgba(255,255,255,0.03);
}

/* PARTIDOS */
.match {
  background: #151515;
  padding: 12px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  border-radius: 8px;
}

.match div:first-child { text-align: left; }
.match div:last-child { text-align: right; }

.score {
  color: #00ff88;
  font-weight: bold;
}

/* FLECHAS */
.arrow {
  font-size: 12px;
  margin-left: 5px;
}
</style>
</head>

<body>

<header>⚽ Territori FUTCAT LIVE</header>

<div class="container">

<!-- STATUS -->
<div id="statusBar">
  <div id="lastChange">📡 Último cambio: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<!-- LIGAS -->
<select id="liga"></select>

<!-- CLASIFICACIÓN -->
<h3>📊 Clasificación</h3>

<table>
<thead>
<tr>
  <th>Pos</th>
  <th>Equipo</th>
  <th>Puntos</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<!-- PARTIDOS -->
<h3>⚽ Partidos</h3>
<div id="partidos"></div>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const API = "https://fcf-headless.onrender.com";
const socket = io(API);

let currentLiga = null;
let lastState = new Map();

// ======================
// RENDER CLASIFICACIÓN
function renderTable(data) {

  const tbody = document.getElementById("tabla");

  const sorted = [...data].sort((a, b) =>
    Number(b.puntos) - Number(a.puntos) ||
    a.equipo.localeCompare(b.equipo)
  );

  const newState = new Map();

  tbody.innerHTML = "";

  sorted.forEach((t, i) => {

    const prev = lastState.get(t.equipo);

    // 🔥 FLECHAS ESTABLES
    let arrow = "";
    if (prev) {
      if (prev.pos > i) arrow = " 📈";
      else if (prev.pos < i) arrow = " 📉";
    }

    // 🟢 ZONAS (RECUPERADAS)
    let cls = "mid";
    if (i < 3) cls = "up";
    else if (i >= sorted.length - 3) cls = "down";

    const tr = document.createElement("tr");
    tr.className = cls;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);

    newState.set(t.equipo, { pos: i });
  });

  lastState = newState;
}

// ======================
// PARTIDOS
function renderMatches(matches) {

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  matches.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

// ======================
// STATUS
function updateStatus(ts) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

// ======================
// REST INIT
async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  renderTable(clas.data);
  renderMatches(part.data);

  updateStatus(clas.lastUpdate);
}

// ======================
// SOCKET LIVE
socket.on("clasificacion", (msg) => {

  if (msg.liga !== currentLiga) return;

  renderTable(msg.data);
  updateStatus(msg.time);
});

// ======================
// LIGAS
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");
  select.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  const saved = localStorage.getItem("liga");
  currentLiga = saved || json.data[0].id;
  select.value = currentLiga;

  select.onchange = (e) => {
    currentLiga = e.target.value;
    localStorage.setItem("liga", currentLiga);

    lastState.clear();
    document.getElementById("tabla").innerHTML = "";
    document.getElementById("partidos").innerHTML = "";

    loadData();
  };

  loadData();
}

// ======================
loadLigas();
setInterval(loadData, 10000);

</script>

</body>
</html>
