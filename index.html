<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TERRITORI FUTCAT LIVE PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #111;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* ================= STATUS BAR ================= */
#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  font-size: 12px;
}

.badge {
  background: #222;
  padding: 6px 10px;
  border-radius: 5px;
  color: #ccc;
}

/* ================= TABLE ================= */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

tr.updated {
  background: #1f3b2c !important;
  transition: 0.5s;
}
</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE PRO</header>

<div class="container">

<select id="liga"></select>

<!-- ================= STATUS BAR ================= -->
<div id="statusBar">
  <div id="lastChange">📡 Último cambio real: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<h3>📊 Clasificación</h3>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Equipo</th>
  <th>Pts</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let lastData = null;

// ======================
// LIGAS
// ======================
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");
  select.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  currentLiga = json.data[0].id;
  select.value = currentLiga;

  select.addEventListener("change", e => {
    currentLiga = e.target.value;
    loadData();
  });

  loadData();
}

// ======================
// DATA
// ======================
async function loadData() {

  const res = await fetch(API + "/clasificacion?liga=" + currentLiga);
  const json = await res.json();

  renderTable(json.data);

  updateStatus(json.lastUpdate);
}

// ======================
// TABLE
// ======================
function renderTable(data) {

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.forEach((t, i) => {

    const tr = document.createElement("tr");

    if (lastData) {
      const prev = lastData.find(x => x.equipo === t.equipo);
      if (prev && prev.puntos !== t.puntos) {
        tr.classList.add("updated");
      }
    }

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
  });

  lastData = data;
}

// ======================
// STATUS BAR UPDATE
// ======================
function updateStatus(lastChange) {

  const now = new Date();

  const formatted = now.toLocaleString("es-ES", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio real: " + (lastChange || "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + formatted;
}

// ======================
// AUTO REFRESH
// ======================
setInterval(() => {
  if (currentLiga) loadData();
}, 15000);

// ======================
loadLigas();

</script>

</body>
</html>
