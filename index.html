<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 10px 0 30px 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* HEADER */

header {
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

header::after {
  content: "";
  display: block;
  height: 2px;
  margin-top: 10px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
}

/* STATUS */

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  margin: 15px 0;
  font-size: 12px;
  border: 1px solid rgba(0,255,136,0.2);
}

/* SELECTS */

select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* TITLES */

.section-title {
  font-weight: bold;
  margin-top: 10px;
}

.section-line {
  height: 2px;
  background: linear-gradient(90deg, #00ff88, transparent);
  margin: 10px 0;
}

/* LAYOUT */

.layout {
  display: flex;
  gap: 30px;
}

.left, .right {
  flex: 1;
}

/* MATCH */

.match {
  background: #151515;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}

/* TABLE */

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <!-- STATUS -->
  <div id="statusBar">
    <div id="lastChange">📡 Último cambio: --</div>
    <div id="lastRefresh">🕒 Último refresh: --</div>
  </div>

  <!-- LIGA -->
  <select id="liga"></select>

  <!-- TEMPORADA -->
  <select id="temporada"></select>

  <div class="layout">

    <!-- PARTIDOS -->
    <div class="left">

      <div class="section-title">⚽ Partidos</div>
      <div class="section-line"></div>

      <div id="partidos"></div>

    </div>

    <!-- CLASIFICACION -->
    <div class="right">

      <div class="section-title">📊 Clasificación</div>
      <div class="section-line"></div>

      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>Puntos</th>
            <th>J</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

      <br>

      <div class="section-title">📈 Estadísticas</div>
      <div class="section-line"></div>

      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>GF</th>
            <th>GC</th>
            <th>DIF</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody id="stats"></tbody>
      </table>

    </div>

  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let currentTemporada = null;

/* ================= LIGAS ================= */

async function loadLigas(){

  const res = await fetch(API+"/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  currentLiga = json.data[0].id;
  sel.value = currentLiga;

  sel.onchange = (e)=>{
    currentLiga = e.target.value;
    loadData();
  };

  loadTemporadas();
}

/* ================= TEMPORADAS ================= */

function loadTemporadas(){

  const sel = document.getElementById("temporada");

  const seasons = ["2023-24","2024-25","2025-26"];

  sel.innerHTML = "";

  seasons.forEach(s=>{
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });

  currentTemporada = localStorage.getItem("temporada") || seasons[0];
  sel.value = currentTemporada;

  sel.onchange = (e)=>{
    currentTemporada = e.target.value;
    localStorage.setItem("temporada", currentTemporada);
    loadData();
  };

  loadData();
}

/* ================= DATA ================= */

async function loadData(){

  if(!currentLiga || !currentTemporada) return;

  const [c,p,s] = await Promise.all([
    fetch(API+"/clasificacion?liga="+currentLiga+"&temporada="+currentTemporada),
    fetch(API+"/partidos?liga="+currentLiga+"&temporada="+currentTemporada),
    fetch(API+"/estadisticas?liga="+currentLiga+"&temporada="+currentTemporada)
  ]);

  const clas = await c.json();
  const part = await p.json();
  const stats = await s.json();

  renderClas(clas.data);
  renderMatches(part.data);
  renderStats(stats.data);

  updateStatus(clas.lastUpdate);
}

/* ================= PARTIDOS ================= */

function renderMatches(data){

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  data.forEach(p=>{

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local} ${p.goles_local}-${p.goles_visitante} ${p.visitante}</div>
      <div>${p.jornada}</div>
    `;

    div.appendChild(el);
  });
}

/* ================= CLASIFICACION ================= */

function renderClas(data){

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.forEach(t=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* ================= ESTADISTICAS ================= */

function renderStats(data){

  const tbody = document.getElementById("stats");
  tbody.innerHTML = "";

  data.forEach(t=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.goles_favor}</td>
      <td>${t.goles_contra}</td>
      <td>${t.diferencia}</td>
      <td>${t.puntos}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* ================= STATUS ================= */

function updateStatus(ts){

  document.getElementById("lastChange").innerText =
    "📡 Último cambio: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + new Date().toLocaleString("es-ES");
}

loadLigas();
setInterval(loadData,10000);

</script>

</body>
</html>
