<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 10px 0 30px 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

header {
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

header::after {
  content: "";
  display: block;
  height: 2px;
  margin-top: 10px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
}

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  margin: 15px 0;
  font-size: 12px;
  border: 1px solid rgba(0,255,136,0.2);
}

select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

.section-title {
  font-weight: bold;
  margin-top: 10px;
}

.section-line {
  height: 2px;
  background: linear-gradient(90deg, #00ff88, transparent);
  margin: 10px 0;
}

.layout {
  display: flex;
  gap: 30px;
}

.left, .right {
  flex: 1;
}

.match {
  background: #151515;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
}

.match.pending {
  opacity: 0.6;
}

.match .score {
  color: #00ff88;
  font-weight: bold;
}

.match .pending-label {
  color: #888;
  font-style: italic;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div id="statusBar">
    <div id="lastChange">📡 Último cambio: --</div>
    <div id="lastRefresh">🕒 Último refresh: --</div>
  </div>

  <select id="liga"></select>

  <select id="temporada"></select>

  <div class="layout">

    <div class="left">

      <div class="section-title">⚽ Partidos</div>
      <div class="section-line"></div>

      <div id="partidos"></div>

    </div>

    <div class="right">

      <div class="section-title">📊 Clasificación</div>
      <div class="section-line"></div>

      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>Puntos</th>
            <th>J</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

      <br>

      <div class="section-title">📈 Estadísticas</div>
      <div class="section-line"></div>

      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>GF</th>
            <th>GC</th>
            <th>DIF</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody id="stats"></tbody>
      </table>

    </div>

  </div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let currentTemporada = null;
let loading = false;

async function loadLigas(){

  const res = await fetch(API+"/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  currentLiga = json.data[0].id;
  sel.value = currentLiga;

  sel.onchange = (e)=>{
    currentLiga = e.target.value;
    loadData();
  };

  await loadTemporadas();
}

async function loadTemporadas(){

  const res = await fetch(API+"/temporadas");
  const json = await res.json();

  const sel = document.getElementById("temporada");
  sel.innerHTML = "";

  json.data.forEach(s=>{
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });

  const saved = localStorage.getItem("temporada");
  currentTemporada = (saved && json.data.includes(saved))
    ? saved
    : json.data[json.data.length-1];

  sel.value = currentTemporada;

  sel.onchange = (e)=>{
    currentTemporada = e.target.value;
    localStorage.setItem("temporada", currentTemporada);
    loadData();
  };

  loadData();
}

async function loadData(){

  if(!currentLiga || !currentTemporada) return;
  if(loading) return;
  loading = true;

  try {

    const [c,p] = await Promise.all([
      fetch(API+"/clasificacion?liga="+currentLiga+"&temporada="+currentTemporada),
      fetch(API+"/partidos?liga="+currentLiga+"&temporada="+currentTemporada)
    ]);

    const clas = await c.json();
    const part = await p.json();

    renderClas(clas.data);
    renderMatches(part.data);
    renderStats(clas.data);

    updateStatus(clas.lastUpdate);

  } catch(err){
    console.error("Error cargando datos:", err);
  } finally {
    loading = false;
  }
}

function renderMatches(data){

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  data.forEach(p=>{

    const el = document.createElement("div");

    if(p.jugado){
      el.className = "match";
      el.innerHTML = `
        <div>${p.local} <span class="score">${p.goles_local}-${p.goles_visitante}</span> ${p.visitante}</div>
        <div>${p.jornada || ""}</div>
      `;
    } else {
      el.className = "match pending";
      el.innerHTML = `
        <div>${p.local} <span class="pending-label">vs</span> ${p.visitante}</div>
        <div>${p.jornada || ""}</div>
      `;
    }

    div.appendChild(el);
  });
}

function renderClas(data){

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.forEach(t=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
  });
}

function renderStats(data){

  const tbody = document.getElementById("stats");
  tbody.innerHTML = "";

  data.forEach(t=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.goles_favor}</td>
      <td>${t.goles_contra}</td>
      <td>${t.diferencia}</td>
      <td>${t.puntos}</td>
    `;

    tbody.appendChild(tr);
  });
}

function updateStatus(ts){

  document.getElementById("lastChange").innerText =
    "📡 Último cambio: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + new Date().toLocaleString("es-ES");
}

loadLigas();
setInterval(loadData,10000);

</script>

</body>
</html>
