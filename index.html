<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* =========================
   HEADER PRO
========================= */
header {
  padding: 18px;
  text-align: center;
  background: linear-gradient(90deg, #111, #0a0a0a, #111);
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(0,255,136,0.15);
}

/* =========================
   CONTENEDOR
========================= */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

/* =========================
   STATUS BAR PRO
========================= */
#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 10px;
  border: 1px solid rgba(0,255,136,0.1);
}

/* =========================
   SELECT
========================= */
select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  border-radius: 6px;
}

/* =========================
   TABLA PRO
========================= */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 11px;
  text-align: center;
  border-bottom: 1px solid #222;
  font-size: 14px;
}

th {
  color: #00ff88;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* =========================
   ZONAS VISUALES
========================= */
.up td {
  background: rgba(0,255,0,0.15) !important;
  box-shadow: inset 0 0 10px rgba(0,255,136,0.08);
}

.down td {
  background: rgba(255,0,0,0.15) !important;
  box-shadow: inset 0 0 10px rgba(255,0,0,0.08);
}

.mid td {
  background: rgba(255,255,255,0.03);
}

/* =========================
   PARTIDOS ULTRA PRO
========================= */
.match {
  background: linear-gradient(90deg, #151515, #101010);
  padding: 12px;
  margin-bottom: 8px;

  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;

  border-radius: 8px;
  border-left: 3px solid rgba(0,255,136,0.35);

  transition: all 0.2s ease;
}

/* hover suave estilo app */
.match:hover {
  transform: scale(1.01);
  border-left: 3px solid rgba(0,255,136,0.7);
}

.match div:first-child {
  text-align: left;
}

.match div:last-child {
  text-align: right;
}

/* RESULTADO CENTRADO PERFECTO */
.score {
  color: #00ff88;
  font-weight: bold;
  text-align: center;
  justify-self: center;
  min-width: 80px;
}

/* =========================
   TITULOS PRO FLASHCORE
========================= */
h3 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
  font-size: 16px;
  letter-spacing: 0.5px;
}

/* línea elegante verde */
h3::after {
  content: "";
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, #00ff88, transparent);
  opacity: 0.8;
}

/* =========================
   FLECHAS PRO
========================= */
.arrow {
  font-size: 12px;
  margin-left: 5px;
  opacity: 0.9;
}
</style>
</head>

<body>

<header>⚽ Territori FUTCAT Live</header>

<div class="container">

<div id="statusBar">
  <div id="lastChange">📡 Último cambio real: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<select id="liga"></select>

<h3>📊 Clasificación</h3>

<table>
<thead>
<tr>
  <th>Pos</th>
  <th>Equipo</th>
  <th>Puntos</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<h3>⚽ Partidos</h3>
<div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;

// ======================
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  const saved = localStorage.getItem("liga");
  currentLiga = saved || json.data[0].id;
  sel.value = currentLiga;

  sel.onchange = (e) => {
    currentLiga = e.target.value;
    localStorage.setItem("liga", currentLiga);

    document.getElementById("tabla").innerHTML = "";
    document.getElementById("partidos").innerHTML = "";

    loadData();
  };

  loadData();
}

// ======================
async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  renderTable(clas.data);
  renderMatches(part.data);

  updateStatus(clas.lastUpdate);
}

// ======================
function renderTable(data) {

  const tbody = document.getElementById("tabla");

  data.sort((a, b) =>
    b.puntos - a.puntos || a.equipo.localeCompare(b.equipo)
  );

  data.forEach((t, i) => {

    let tr = document.getElementById("row-" + t.equipo);

    if (!tr) {
      tr = document.createElement("tr");
      tr.id = "row-" + t.equipo;
      tbody.appendChild(tr);
    }

    let arrow = "";
    if (t.movement === "up") arrow = " <span class='arrow'>📈</span>";
    else if (t.movement === "down") arrow = " <span class='arrow'>📉</span>";

    let cls = "mid";
    if (i < 3) cls = "up";
    else if (i >= data.length - 3) cls = "down";

    tr.className = cls;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;
  });
}

// ======================
function renderMatches(matches) {

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  matches.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

// ======================
function updateStatus(ts) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio real: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

// ======================
loadLigas();
setInterval(loadData, 10000);

</script>

</body>
</html>
