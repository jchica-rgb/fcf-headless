<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TERRITORI FUTCAT LIVE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #111;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

tr.updated {
  background: #1f3b2c !important;
  transition: 0.5s;
}

#status {
  font-size: 12px;
  color: #aaa;
  margin: 10px 0;
}

.badge {
  display: inline-block;
  padding: 5px 8px;
  background: #222;
  border-radius: 5px;
  margin-right: 5px;
}
</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE PRO</header>

<div class="container">

<div id="status">
  🔄 Cargando sistema...
</div>

<select id="liga"></select>

<h3>📊 Clasificación</h3>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Equipo</th>
  <th>Pts</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let lastData = null;
let lastUpdate = null;

// ======================
// LIGAS
// ======================
async function loadLigas() {
  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");
  select.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  currentLiga = json.data[0].id;
  select.value = currentLiga;

  select.addEventListener("change", e => {
    currentLiga = e.target.value;
    loadData();
  });

  loadData();
}

// ======================
// DATA
// ======================
async function loadData() {

  const res = await fetch(API + "/clasificacion?liga=" + currentLiga);
  const json = await res.json();

  renderTable(json.data);

  updateStatus(json.lastUpdate);
}

// ======================
// RENDER TABLE + HIGHLIGHT
// ======================
function renderTable(data) {

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.forEach((t, i) => {

    const tr = document.createElement("tr");

    // highlight cambios
    if (lastData) {
      const prev = lastData.find(x => x.equipo === t.equipo);
      if (prev && prev.puntos !== t.puntos) {
        tr.classList.add("updated");
      }
    }

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
  });

  lastData = data;
}

// ======================
// STATUS
// ======================
function updateStatus(serverTime) {

  const now = new Date().toLocaleTimeString();

  document.getElementById("status").innerHTML = `
    <span class="badge">🕒 Último refresh: ${now}</span>
    <span class="badge">📡 Último cambio real: ${serverTime || "sin cambios"}</span>
  `;
}

// ======================
// LIVE AUTO REFRESH
// ======================
setInterval(() => {
  if (currentLiga) loadData();
}, 15000);

// ======================
loadLigas();

</script>

</body>
</html>
