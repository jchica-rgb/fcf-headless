<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TERRITORI FUTCAT LIVE PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #111;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

/* STATUS */
#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}

.badge {
  background: #222;
  padding: 6px 10px;
  border-radius: 5px;
}

/* SELECT */
select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
  margin-bottom: 20px;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

tr.updated {
  background: #1f3b2c !important;
  transition: 0.4s;
}

/* MATCHES */
.match {
  background: #151515;
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  border-radius: 6px;
}

.score {
  color: #00ff88;
  font-weight: bold;
}
</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE PRO</header>

<div class="container">

<!-- STATUS -->
<div id="statusBar">
  <div id="lastChange">📡 Último cambio real: --</div>
  <div id="lastRefresh">🕒 Último refresh: --</div>
</div>

<!-- LIGAS -->
<select id="liga"></select>

<h3>📊 Clasificación</h3>
<table>
<thead>
<tr>
  <th>#</th>
  <th>Equipo</th>
  <th>Pts</th>
  <th>J</th>
  <th>G</th>
  <th>E</th>
  <th>P</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<h3>⚽ Partidos</h3>
<div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let lastData = new Map();

/* =====================
   FORMATO FECHA
===================== */
function formatTime(ts) {
  if (!ts) return "--";

  return new Date(ts).toLocaleString("es-ES", {
    timeZone: "Europe/Madrid",
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* =====================
   LIGAS (PERSISTENCIA)
===================== */
async function loadLigas() {

  const res = await fetch(API + "/ligas");
  const json = await res.json();

  const select = document.getElementById("liga");
  select.innerHTML = "";

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    select.appendChild(opt);
  });

  const saved = localStorage.getItem("liga");
  currentLiga = saved || json.data[0].id;
  select.value = currentLiga;

  select.addEventListener("change", e => {
    currentLiga = e.target.value;
    localStorage.setItem("liga", currentLiga);
    loadData();
  });

  loadData();
}

/* =====================
   LOAD DATA LIVE
===================== */
async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  updateTable(clas.data);
  updateMatches(part.data);
  updateStatus(clas.lastUpdate);
}

/* =====================
   TABLE LIVE UPDATE
===================== */
function updateTable(data) {

  const tbody = document.getElementById("tabla");

  data.forEach((t, i) => {

    let tr = document.getElementById("row-" + t.equipo);

    const prev = lastData.get(t.equipo);
    const changed = !prev || prev.puntos !== t.puntos;

    if (!tr) {
      tr = document.createElement("tr");
      tr.id = "row-" + t.equipo;
      tbody.appendChild(tr);
    }

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    if (changed) {
      tr.classList.add("updated");
      setTimeout(() => tr.classList.remove("updated"), 600);
    }

    lastData.set(t.equipo, t);
  });
}

/* =====================
   PARTIDOS LIVE
===================== */
function updateMatches(matches) {

  const div = document.getElementById("partidos");
  const active = new Set();

  matches.forEach(p => {

    const id = p.local + "-" + p.visitante;
    active.add(id);

    let el = document.getElementById("m-" + id);

    if (!el) {
      el = document.createElement("div");
      el.className = "match";
      el.id = "m-" + id;
      div.appendChild(el);
    }

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local ?? 0} - ${p.goles_visitante ?? 0}</div>
      <div>${p.visitante}</div>
    `;
  });

  document.querySelectorAll(".match").forEach(m => {
    if (!active.has(m.id.replace("m-", ""))) {
      m.remove();
    }
  });
}

/* =====================
   STATUS BAR
===================== */
function updateStatus(lastChange) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio real: " + formatTime(lastChange);

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

/* =====================
   LIVE LOOP
===================== */
setInterval(() => {
  if (currentLiga) loadData();
}, 12000);

/* INIT */
loadLigas();

</script>

</body>
</html>
