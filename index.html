<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>

<style>

/* ======================
   BASE
====================== */

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 10px 0 30px 0;
}

/* 🔥 CONTENEDOR GLOBAL (CLAVE NUEVA) */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ======================
   HEADER
====================== */

header {
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
}

/* ======================
   STATUS BAR (FIX ALINEACIÓN)
====================== */

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  margin: 15px 0;
  font-size: 12px;
}

/* ======================
   SELECT
====================== */

select {
  width: 100%;
  margin: 15px 0 20px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* ======================
   LAYOUT PRINCIPAL
====================== */

.layout {
  display: flex;
  gap: 35px; /* 🔥 MÁS ESPACIO REAL ENTRE COLUMNAS */

  align-items: stretch;
}

/* columnas iguales */
.left, .right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ======================
   DIVIDER
====================== */

.divider {
  width: 3px;
  align-self: stretch;

  background: linear-gradient(
    to bottom,
    transparent,
    #00ff88,
    #00ff88,
    transparent
  );

  box-shadow: 0 0 12px #00ff88;
}

/* ======================
   TABLE
====================== */

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

/* ======================
   MATCHES (FIX VISITANTE)
====================== */

.match {
  background: #151515;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 8px;

  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;

  gap: 10px; /* 🔥 CLAVE NUEVA */
}

/* visitante alineado a derecha */
.match div:last-child {
  text-align: right;
}

/* marcador centrado limpio */
.score {
  color: #00ff88;
  font-weight: bold;
  min-width: 60px;
  text-align: center;
}

/* ======================
   ZONAS
====================== */

.up td {
  background: rgba(0,255,0,0.15) !important;
}

.down td {
  background: rgba(255,0,0,0.15) !important;
}

.mid td {
  background: rgba(255,255,255,0.03);
}

/* ======================
   RESPONSIVE
====================== */

@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }

  .divider {
    display: none;
  }
}

</style>
</head>

<body>

<header>⚽ Territori FUTCAT LIVE</header>

<div class="container">

  <div id="statusBar">
    <div id="lastChange">📡 Último cambio: --</div>
    <div id="lastRefresh">🕒 Último refresh: --</div>
  </div>

  <select id="liga"></select>

  <div class="layout">

    <!-- PARTIDOS -->
    <div class="left">
      <h3>⚽ Partidos</h3>
      <div id="partidos"></div>
    </div>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- CLASIFICACIÓN -->
    <div class="right">
      <h3>📊 Clasificación</h3>

      <table>
        <thead>
          <tr>
            <th>Pos</th>
            <th>Equipo</th>
            <th>Puntos</th>
            <th>J</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

    </div>

  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const API = "https://fcf-headless.onrender.com";
const socket = io(API);

let currentLiga = null;
let lastState = new Map();

/* ======================
   CLASIFICACIÓN
====================== */

function renderTable(data) {

  const tbody = document.getElementById("tabla");

  const sorted = [...data].sort((a, b) =>
    Number(b.puntos) - Number(a.puntos) ||
    a.equipo.localeCompare(b.equipo)
  );

  const newState = new Map();
  tbody.innerHTML = "";

  sorted.forEach((t, i) => {

    const prev = lastState.get(t.equipo);

    let arrow = "";
    if (prev) {
      if (prev.pos > i) arrow = " 📈";
      else if (prev.pos < i) arrow = " 📉";
    }

    let cls = "mid";
    if (i < 3) cls = "up";
    else if (i >= sorted.length - 3) cls = "down";

    const tr = document.createElement("tr");
    tr.className = cls;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
    newState.set(t.equipo, { pos: i });
  });

  lastState = newState;
}

/* ======================
   PARTIDOS
====================== */

function renderMatches(matches) {

  const div = document.getElementById("partidos");
  div.innerHTML = "";

  matches.forEach(p => {

    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

/* ======================
   STATUS
====================== */

function updateStatus(ts) {

  const now = new Date().toLocaleString("es-ES", {
    timeZone: "Europe/Madrid"
  });

  document.getElementById("lastChange").innerText =
    "📡 Último cambio: " + (ts ? new Date(ts).toLocaleString() : "--");

  document.getElementById("lastRefresh").innerText =
    "🕒 Último refresh: " + now;
}

/* ======================
   LOAD
====================== */

async function loadData() {

  const [c, p] = await Promise.all([
    fetch(API + "/clasificacion?liga=" + currentLiga),
    fetch(API + "/partidos?liga=" + currentLiga)
  ]);

  const clas = await c.json();
  const part = await p.json();

  renderTable(clas.data);
  renderMatches(part.data);
  updateStatus(clas.lastUpdate);
}

/* ====================== */

loadData();
setInterval(loadData, 10000);

</script>

</body>
</html>
