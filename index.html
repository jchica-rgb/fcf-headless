<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 10px 0 30px 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

header {
  position: relative;
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

header::after {
  content: "";
  display: block;
  height: 2px;
  margin-top: 10px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
}

#adminBtn {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  background: #00ff88;
  color: #0a0a0a;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: normal;
  text-decoration: none;
}

#adminBtn:hover {
  background: #00cc6a;
}

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  margin: 15px 0;
  font-size: 12px;
  border: 1px solid rgba(0,255,136,0.2);
}

#connStatus.online {
  color: #00ff88;
}

#connStatus.offline {
  color: #ff5555;
}

select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

.section-title {
  font-weight: bold;
  margin-top: 10px;
}

.section-line {
  height: 2px;
  background: linear-gradient(90deg, #00ff88, transparent);
  margin: 10px 0;
}

.layout {
  display: flex;
  gap: 30px;
}

.left, .right {
  flex: 1;
}

/* NAVEGACION JORNADA */
#jornadaNav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  border-radius: 6px;
  padding: 8px 10px;
  margin: 10px 0;
}

#jornadaNav button {
  background: #1a1a1a;
  color: #00ff88;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 8px 14px;
  font-weight: bold;
  cursor: pointer;
}

#jornadaNav button:disabled {
  color: #444;
  cursor: default;
  border-color: #222;
}

#jornadaLabel {
  font-weight: bold;
}

/* PARTIDOS: local | marcador | visitante | jornada, en columnas alineadas */
.match {
  background: #151515;
  padding: 10px 14px;
  margin: 5px 0;
  border-radius: 6px;
  display: grid;
  grid-template-columns: 1fr auto 1fr auto;
  align-items: center;
  gap: 10px;
}

.match.pending {
  opacity: 0.6;
}

.match.recent {
  animation: flash 1.5s ease;
}

@keyframes flash {
  0% { background: rgba(0,255,136,0.35); }
  100% { background: #151515; }
}

.match .team-local {
  text-align: left;
}

.match .team-visitante {
  text-align: right;
}

.match .score {
  color: #00ff88;
  font-weight: bold;
  text-align: center;
  white-space: nowrap;
}

.match .pending-label {
  color: #888;
  font-style: italic;
  text-align: center;
  white-space: nowrap;
}

.match .jornada {
  color: #888;
  font-size: 12px;
  text-align: right;
  min-width: 30px;
}

.empty-msg {
  color: #888;
  font-style: italic;
  padding: 10px 0;
}

/* TABLAS: equipo alineado a la izquierda, resto centrado */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

td:first-child, th:first-child {
  text-align: left;
}
</style>
</head>
<body>

<header>
  ⚽ TERRITORI FUTCAT LIVE
  <a id="adminBtn" href="https://fcf-headless.vercel.app/admin.html">🔐 Acceso Admin</a>
</header>

<div class="container">

  <div id="statusBar">
    <div id="connStatus" class="offline">🔴 Conectando...</div>
    <div id="lastChange">🕐 Último cambio: --</div>
  </div>

  <select id="liga"></select>
  <select id="temporada"></select>

  <div class="layout">
    <div class="left">
      <div class="section-title">⚽ Partidos</div>
      <div class="section-line"></div>

      <div id="jornadaNav">
        <button id="btnPrevJornada">← Anterior</button>
        <div id="jornadaLabel">Jornada --</div>
        <button id="btnNextJornada">Siguiente →</button>
      </div>

      <div id="partidos"></div>
    </div>

    <div class="right">
      <div class="section-title">📊 Clasificación</div>
      <div class="section-line"></div>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>Puntos</th>
            <th>J</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

      <br>

      <div class="section-title">📈 Estadísticas</div>
      <div class="section-line"></div>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>GF</th>
            <th>GC</th>
            <th>DIF</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody id="stats"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let currentTemporada = null;
let currentJornada = null;
let jornadasDisponibles = [];
let loading = false;

/* ================= SOCKET.IO (tiempo real) =================
   Antes: setInterval(loadData, 10000) preguntaba cada 10s
   aunque no hubiera cambios. Ahora el servidor avisa en el
   momento exacto en que se crea/edita un partido, y aquí
   solo recargamos cuando llega ese aviso. Se mantiene un
   polling de respaldo cada 60s por si el socket se cae. */
const socket = io(API);

socket.on("connect", ()=>{
  const el = document.getElementById("connStatus");
  el.textContent = "🟢 En directo";
  el.className = "online";
});

socket.on("disconnect", ()=>{
  const el = document.getElementById("connStatus");
  el.textContent = "🔴 Reconectando...";
  el.className = "offline";
});

socket.on("partidos-actualizados", ()=>{
  loadData();
});

async function loadLigas(){
  const res = await fetch(API+"/ligas");
  const json = await res.json();

  const sel = document.getElementById("liga");
  sel.innerHTML = "";

  json.data.forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre;
    sel.appendChild(opt);
  });

  currentLiga = json.data[0].id;
  sel.value = currentLiga;

  sel.onchange = (e)=>{
    currentLiga = e.target.value;
    currentJornada = null;
    loadData();
  };

  await loadTemporadas();
}

async function loadTemporadas(){
  const res = await fetch(API+"/temporadas");
  const json = await res.json();

  const sel = document.getElementById("temporada");
  sel.innerHTML = "";

  json.data.forEach(s=>{
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });

  const saved = localStorage.getItem("temporada");
  currentTemporada = (saved && json.data.includes(saved))
    ? saved
    : json.data[json.data.length-1];

  sel.value = currentTemporada;

  sel.onchange = (e)=>{
    currentTemporada = e.target.value;
    currentJornada = null;
    localStorage.setItem("temporada", currentTemporada);
    loadData();
  };

  loadData();
}

async function loadData(){
  if(!currentLiga || !currentTemporada) return;
  if(loading) return;
  loading = true;

  try {
    const [c,p] = await Promise.all([
      fetch(API+"/clasificacion?liga="+currentLiga+"&temporada="+currentTemporada),
      fetch(API+"/partidos?liga="+currentLiga+"&temporada="+currentTemporada)
    ]);

    const clas = await c.json();
    const part = await p.json();

    calcularJornadas(part.data);
    renderClas(clas.data);
    renderMatches(part.data);
    renderStats(clas.data);
    updateStatus(clas.lastUpdate);
  } catch(err){
    console.error("Error cargando datos:", err);
  } finally {
    loading = false;
  }
}

function calcularJornadas(partidos){
  const jornadasSet = new Set(
    partidos.map(p=>p.jornada).filter(j=>j!==null && j!=="" && j!==undefined)
  );

  jornadasDisponibles = [...jornadasSet].sort((a,b)=>
    Number(a) - Number(b)
  );

  if(jornadasDisponibles.length===0){
    currentJornada = null;
    renderJornadaNav();
    return;
  }

  const jornadaValida = currentJornada!==null &&
    jornadasDisponibles.includes(currentJornada);

  if(!jornadaValida){
    const jugadas = jornadasDisponibles.filter(j=>
      partidos.some(p=>p.jornada===j && p.jugado)
    );

    currentJornada = jugadas.length>0
      ? jugadas[jugadas.length-1]
      : jornadasDisponibles[0];
  }

  renderJornadaNav();
}

function renderJornadaNav(){
  const label = document.getElementById("jornadaLabel");
  const btnPrev = document.getElementById("btnPrevJornada");
  const btnNext = document.getElementById("btnNextJornada");

  if(currentJornada===null){
    label.textContent = "Sin jornadas";
    btnPrev.disabled = true;
    btnNext.disabled = true;
    return;
  }

  label.textContent = "Jornada " + currentJornada;

  const idx = jornadasDisponibles.indexOf(currentJornada);
  btnPrev.disabled = idx<=0;
  btnNext.disabled = idx>=jornadasDisponibles.length-1;
}

function goPrevJornada(){
  const idx = jornadasDisponibles.indexOf(currentJornada);
  if(idx>0){
    currentJornada = jornadasDisponibles[idx-1];
    renderJornadaNav();
    loadData();
  }
}

function goNextJornada(){
  const idx = jornadasDisponibles.indexOf(currentJornada);
  if(idx>=0 && idx<jornadasDisponibles.length-1){
    currentJornada = jornadasDisponibles[idx+1];
    renderJornadaNav();
    loadData();
  }
}

document.getElementById("btnPrevJornada").onclick = goPrevJornada;
document.getElementById("btnNextJornada").onclick = goNextJornada;

function renderMatches(data){
  const div = document.getElementById("partidos");
  div.innerHTML = "";

  const filtrados = currentJornada===null
    ? []
    : data.filter(p=>p.jornada===currentJornada);

  if(filtrados.length===0){
    div.innerHTML = `<div class="empty-msg">No hay partidos en esta jornada.</div>`;
    return;
  }

  filtrados.forEach(p=>{
    const el = document.createElement("div");

    if(p.jugado){
      el.className = "match";
      el.innerHTML = `
        <div class="team-local">${p.local}</div>
        <div class="score">${p.goles_local}-${p.goles_visitante}</div>
        <div class="team-visitante">${p.visitante}</div>
        <div class="jornada">J${p.jornada}</div>
      `;
    } else {
      el.className = "match pending";
      el.innerHTML = `
        <div class="team-local">${p.local}</div>
        <div class="pending-label">vs</div>
        <div class="team-visitante">${p.visitante}</div>
        <div class="jornada">J${p.jornada}</div>
      `;
    }

    div.appendChild(el);
  });
}

function renderClas(data){
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  data.forEach(t=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderStats(data){
  const tbody = document.getElementById("stats");
  tbody.innerHTML = "";

  data.forEach(t=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${t.equipo}</td>
      <td>${t.goles_favor}</td>
      <td>${t.goles_contra}</td>
      <td>${t.diferencia}</td>
      <td>${t.puntos}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateStatus(ts){
  document.getElementById("lastChange").innerText =
    "🕐 Último cambio: " + (ts ? new Date(ts).toLocaleString() : "--");
}

loadLigas();

// Red de seguridad: si el socket se cae y no se reconecta,
// esto asegura que como mucho pasa 1 minuto sin refrescar.
setInterval(loadData, 60000);
</script>
</body>
</html>
