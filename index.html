<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TERRITORI FUTCAT LIVE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #111;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th { color: #00ff88; }

    tr:hover td { background: #1a1a1a; }

    tr.green td { color: #00ff88 !important; font-weight: bold; }
    tr.yellow td { color: #ffd166 !important; }
    tr.red td { color: #ff4d4d !important; }

    .match {
      background: #151515;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 6px;
    }

    .score {
      color: #00ff88;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
    }

    #live {
      text-align: center;
      color: #00ff88;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div id="live">🔴 Inicializando sistema...</div>

  <select id="liga"></select>

  <h3>📊 Clasificación</h3>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Equipo</th>
        <th>Pts</th>
        <th>J</th>
        <th>G</th>
        <th>E</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <h3>⚽ Partidos</h3>
  <div id="partidos"></div>

</div>

<script>

const API = "https://fcf-headless.onrender.com";

let currentLiga = null;
let lastStateByLiga = {};
let lastUpdate = null;

// ======================
// INIT (FIX ARRANQUE)
// ======================
async function init() {
  try {
    await loadLigas();
  } catch (e) {
    console.error("ERROR INIT:", e);
    document.getElementById("live").innerText = "❌ Error cargando sistema";
  }
}

// ======================
// LIGAS (CON MEMORIA + FIX STARTUP)
// ======================
async function loadLigas() {

  const res = await fetch(`${API}/ligas`);
  const json = await res.json();

  const data = json.data || [];

  const select = document.getElementById("liga");
  select.innerHTML = "";

  if (!data.length) {
    document.getElementById("live").innerText = "❌ No hay ligas";
    return;
  }

  data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.textContent = l.nombre || l.name || `Liga ${l.id}`;
    select.appendChild(opt);
  });

  // 🔥 MEMORIA DE LIGA
  const savedLiga = localStorage.getItem("tf_liga");

  currentLiga =
    savedLiga && data.some(l => l.id === savedLiga)
      ? savedLiga
      : data[0].id;

  select.value = currentLiga;

  select.onchange = (e) => {
    currentLiga = e.target.value;
    localStorage.setItem("tf_liga", currentLiga);
    loadData();
  };

  await loadData();
}

// ======================
// DATA (ROBUSTO + FIX HANG)
// ======================
async function loadData() {

  if (!currentLiga) return;

  try {

    document.getElementById("live").innerText = "🟡 Cargando datos...";

    const [r1, r2] = await Promise.all([
      fetch(`${API}/clasificacion?liga=${currentLiga}`),
      fetch(`${API}/partidos?liga=${currentLiga}`)
    ]);

    const j1 = await r1.json();
    const j2 = await r2.json();

    const clasificacion = j1.data || [];
    const partidos = j2.data || [];

    const hash = JSON.stringify({
      clasificacion,
      partidos
    });

    if (lastStateByLiga[currentLiga] !== hash) {
      lastStateByLiga[currentLiga] = hash;

      lastUpdate = new Date().toLocaleString("es-ES", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    renderTable(clasificacion);
    renderMatches(partidos);
    updateLive();

  } catch (err) {
    console.error("ERROR LOAD DATA:", err);
    document.getElementById("live").innerText = "❌ Error cargando datos";
  }
}

// ======================
// TABLE
// ======================
function renderTable(data) {

  const total = data.length;

  document.getElementById("tabla").innerHTML = data.map((t,i)=>{

    let cls = "";

    if (i < total * 0.25) cls = "green";
    else if (i > total * 0.75) cls = "red";
    else cls = "yellow";

    return `
      <tr class="${cls}">
        <td>${i+1}</td>
        <td>${t.equipo}</td>
        <td>${t.puntos}</td>
        <td>${t.jugados}</td>
        <td>${t.ganados}</td>
        <td>${t.empatados}</td>
        <td>${t.perdidos}</td>
      </tr>
    `;
  }).join("");
}

// ======================
// MATCHES
// ======================
function renderMatches(matches) {

  document.getElementById("partidos").innerHTML =
    matches.map(p=>`
      <div class="match">
        <div>${p.local}</div>
        <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
        <div>${p.visitante}</div>
      </div>
    `).join("");
}

// ======================
// LIVE
// ======================
function updateLive() {

  document.getElementById("live").innerText =
    lastUpdate
      ? "🔴 Última actualización: " + lastUpdate
      : "🟢 Sistema activo (sin cambios)";
}

// ======================
// AUTO REFRESH
// ======================
setInterval(() => {
  if (currentLiga) loadData();
}, 15000);

// ======================
// START
// ======================
init();

</script>

</body>
</html>
