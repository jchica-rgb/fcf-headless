<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Territori FUTCAT LIVE</title>

<style>

/* =========================
   BASE
========================= */

body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  padding: 10px 0 30px 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* =========================
   HEADER (TV STYLE)
========================= */

header {
  padding: 18px;
  text-align: center;
  background: #111;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* línea verde decorativa superior */
header::after {
  content: "";
  display: block;
  height: 2px;
  margin-top: 10px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
}

/* =========================
   STATUS BAR
========================= */

#statusBar {
  display: flex;
  justify-content: space-between;
  background: #111;
  padding: 10px;
  border-radius: 6px;
  margin: 15px 0;
  font-size: 12px;
  border: 1px solid rgba(0,255,136,0.2);
}

/* =========================
   SELECT LIGA
========================= */

select {
  width: 100%;
  margin: 15px 0 20px 0;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
}

/* =========================
   TITULOS SECCIONES
========================= */

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: bold;
  margin-bottom: 10px;
}

.section-line {
  height: 2px;
  width: 100%;
  background: linear-gradient(90deg, #00ff88, transparent);
  margin-bottom: 15px;
}

/* =========================
   LAYOUT
========================= */

.layout {
  display: flex;
  gap: 35px;
  align-items: stretch;
}

.left, .right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* divisor central */
.divider {
  width: 3px;
  background: linear-gradient(to bottom, transparent, #00ff88, #00ff88, transparent);
  box-shadow: 0 0 12px #00ff88;
}

/* =========================
   MATCHES
========================= */

.match {
  background: #151515;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 8px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
}

.match div:last-child {
  text-align: right;
}

.score {
  color: #00ff88;
  font-weight: bold;
}

/* =========================
   TABLE
========================= */

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

th {
  color: #00ff88;
}

/* =========================
   ZONAS
========================= */

.up td { background: rgba(0,255,0,0.15); }
.mid td { background: rgba(255,255,255,0.03); }
.down td { background: rgba(255,0,0,0.15); }

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }

  .divider {
    display: none;
  }
}

</style>
</head>

<body>

<header>⚽ TERRITORI FUTCAT LIVE</header>

<div class="container">

  <div id="statusBar">
    <div id="lastChange">📡 Último cambio: --</div>
    <div id="lastRefresh">🕒 Último refresh: --</div>
  </div>

  <select id="liga"></select>

  <div class="layout">

    <!-- PARTIDOS -->
    <div class="left">

      <div class="section-title">⚽ Partidos</div>
      <div class="section-line"></div>

      <div id="partidos"></div>
    </div>

    <div class="divider"></div>

    <!-- CLASIFICACIÓN -->
    <div class="right">

      <div class="section-title">📊 Clasificación</div>
      <div class="section-line"></div>

      <table>
        <thead>
          <tr>
            <th>Pos</th>
            <th>Equipo</th>
            <th>Puntos</th>
            <th>J</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>

    </div>

  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const API = "https://fcf-headless.onrender.com";
const socket = io(API);

let currentLiga = null;
let lastState = new Map();

/* =========================
   RENDER CLASIFICACION
========================= */

function renderTable(data) {

  const tbody = document.getElementById("tabla");

  const sorted = [...data].sort((a,b)=>
    Number(b.puntos)-Number(a.puntos) ||
    a.equipo.localeCompare(b.equipo)
  );

  const newState = new Map();
  tbody.innerHTML = "";

  sorted.forEach((t,i)=>{

    const prev = lastState.get(t.equipo);

    let arrow="";
    if(prev){
      if(prev.pos>i) arrow=" 📈";
      else if(prev.pos<i) arrow=" 📉";
    }

    let cls="mid";
    if(i<3) cls="up";
    else if(i>=sorted.length-3) cls="down";

    const tr=document.createElement("tr");
    tr.className=cls;

    tr.innerHTML=`
      <td>${i+1}</td>
      <td>${t.equipo}${arrow}</td>
      <td>${t.puntos}</td>
      <td>${t.jugados}</td>
      <td>${t.ganados}</td>
      <td>${t.empatados}</td>
      <td>${t.perdidos}</td>
    `;

    tbody.appendChild(tr);
    newState.set(t.equipo,{pos:i});
  });

  lastState=newState;
}

/* =========================
   MATCHES
========================= */

function renderMatches(matches){

  const div=document.getElementById("partidos");
  div.innerHTML="";

  matches.forEach(p=>{

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      <div>${p.local}</div>
      <div class="score">${p.goles_local} - ${p.goles_visitante}</div>
      <div>${p.visitante}</div>
    `;

    div.appendChild(el);
  });
}

/* =========================
   STATUS
========================= */

function updateStatus(ts){

  const now=new Date().toLocaleString("es-ES",{timeZone:"Europe/Madrid"});

  document.getElementById("lastChange").innerText=
    "📡 Último cambio: "+(ts?new Date(ts).toLocaleString():"--");

  document.getElementById("lastRefresh").innerText=
    "🕒 Último refresh: "+now;
}

/* =========================
   DATA
========================= */

async function loadData(){

  if(!currentLiga) return;

  const [c,p]=await Promise.all([
    fetch(API+"/clasificacion?liga="+currentLiga),
    fetch(API+"/partidos?liga="+currentLiga)
  ]);

  const clas=await c.json();
  const part=await p.json();

  renderTable(clas.data);
  renderMatches(part.data);
  updateStatus(clas.lastUpdate);
}

/* =========================
   SOCKET
========================= */

socket.on("clasificacion",(msg)=>{
  if(msg.liga!==currentLiga) return;
  renderTable(msg.data);
  updateStatus(msg.time);
});

/* =========================
   LIGAS
========================= */

async function loadLigas(){

  const res=await fetch(API+"/ligas");
  const json=await res.json();

  const select=document.getElementById("liga");
  select.innerHTML="";

  json.data.forEach(l=>{
    const opt=document.createElement("option");
    opt.value=l.id;
    opt.textContent=l.nombre;
    select.appendChild(opt);
  });

  currentLiga=localStorage.getItem("liga")||json.data[0].id;
  select.value=currentLiga;

  select.onchange=(e)=>{
    currentLiga=e.target.value;
    localStorage.setItem("liga",currentLiga);

    lastState.clear();
    document.getElementById("tabla").innerHTML="";
    document.getElementById("partidos").innerHTML="";

    loadData();
  };

  loadData();
}

loadLigas();
setInterval(loadData,10000);

</script>

</body>
</html>
